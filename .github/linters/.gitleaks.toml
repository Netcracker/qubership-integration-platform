title = "QIP gitleaks config"

# Keep gitleaks' full default ruleset; we only add the allowlist below.
[extend]
useDefault = true

[allowlist]
description = "Local-dev-only Consul ACL bootstrap token (qip-dev stack, next to postgres/postgres). Not a production secret."
regexes = [
  '''556339d5-f6a3-ff3b-ce1d-98e5b70d4a13''',
]

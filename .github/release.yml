# Categories for GitHub's native release-notes generator (release-all drop notes).
changelog:
  exclude:
    labels:
      - skip-changelog
    authors:
      - github-actions
      - qubership-actions[bot]
      - dependabot
  categories:
    - title: 💥 Breaking Changes
      labels:
        - breaking-change
    - title: 💡 New Features
      labels:
        - feature
        - enhancement
    - title: 🐞 Bug Fixes
      labels:
        - bug
        - fix
        - bugfix
    - title: ⚙️ Technical Debt
      labels:
        - refactor
    - title: 📝 Documentation
      labels:
        - documentation
    - title: 🔩 Other Changes
      labels:
        - "*"

---
# Reusable Maven module release workflow.
#
# Model (bump-before, hand-rolled on top of ${revision}): the module pom carries
# <revision>X.Y.Z</revision> (+ <changelist>-SNAPSHOT</> for the services;
# checkstyle has no changelist) = the last released version. On release we bump
# it per `release-type`, publish that (changelist stripped), tag it, then write
# the bumped <revision> back to the branch. You never type the version — pick
# patch/minor/major. Deciding the version at release time (not pre-writing the
# next one) keeps forked release lines from colliding on a shared pending
# version. An optional `version` input overrides for edge cases (first release,
# explicit jump like a unified 1.0.0). flatten-maven-plugin (ossrh mode) inlines
# the parent and resolves the placeholder, so the published POM has no SNAPSHOT
# parent.
#
# Recovery: if the tag already exists, a previous run published+tagged the
# version but its bump commit never landed. check-version flags recover=true and
# build-and-publish skips deploy/tag/docker and only re-applies the bump, so a
# partial failure is self-healing on the next run instead of wedging the module.
#
# PREREQUISITE: the version-bump push targets a protected branch, so it goes
# through a GitHub App token (vars.GH_BUMP_VERSION_APP_ID +
# secrets.GH_BUMP_VERSION_APP_KEY) whose App is on the branch-protection bypass
# list. Without the App key it falls back to GITHUB_TOKEN, which cannot bypass:
# the push fails and recovery re-applies the bump on the next run once the App
# is configured.

name: Maven Module Release (reusable)

on:
  workflow_call:
    inputs:
      module:
        required: true
        type: string
        description: "Module directory name (e.g. engine, runtime-catalog)"
      release-type:
        description: "patch | minor | major — how to bump <revision> to the released version"
        required: false
        type: string
        default: "patch"
      version:
        description: "Explicit release version (X.Y.Z) override. Empty = bump the current <revision> per release-type."
        required: false
        type: string
        default: ""
      profile:
        description: "Maven profile to use (central | github)"
        type: string
        required: false
        default: "central"
      build-docker:
        description: "Build Docker image"
        required: false
        default: true
        type: boolean
      mvn-args:
        description: "Additional maven arguments (e.g. -DskipTests=true)"
        required: false
        default: ""
        type: string
    secrets:
      MAVEN_USER:
        required: false
        description: "Username for the non-github Maven repository (e.g. Central). Unused when profile=github."
      MAVEN_PASSWORD:
        required: false
        description: "Password/token for the non-github Maven repository. Unused when profile=github."
      MAVEN_GPG_PRIVATE_KEY:
        required: false
        description: "GPG private key used to sign release artifacts."
      MAVEN_GPG_PASSPHRASE:
        required: false
        description: "Passphrase for MAVEN_GPG_PRIVATE_KEY."
      GH_BUMP_VERSION_APP_KEY:
        required: false
        description: "Private key of the GitHub App that bypasses branch protection for the version-bump push. Falls back to GITHUB_TOKEN if unset."

concurrency:
  # Literal prefix (NOT github.workflow): inside a reusable, github.workflow is
  # the TOP-LEVEL caller's name, so manual-vs-cascade or wrapper-vs-release-all
  # runs of the same module would land in different groups and race the
  # publish/tag/back-commit. Keying on the module serialises every release path.
  group: qip-release-${{ inputs.module }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  # ---------------------------------------------------------------------------
  # Preflight: derive the release version by bumping the module's <revision> per
  # release-type (or use the override). If the tag already exists, enter recovery
  # mode (re-apply the bump only) instead of failing.
  # ---------------------------------------------------------------------------
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release-version: ${{ steps.compute.outputs.release-version }}
      next-dev: ${{ steps.compute.outputs.next-dev }}
      release-tag: ${{ steps.compute.outputs.release-tag }}
      recover: ${{ steps.compute.outputs.recover }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # The tag check queries the remote via ls-remote, so shallow is fine.
          fetch-depth: 1
          persist-credentials: false

      - name: Compute release and next-dev versions
        id: compute
        env:
          ECOSYSTEM: maven
          MODULE: ${{ inputs.module }}
          RELEASE_TYPE: ${{ inputs.release-type }}
          VERSION_OVERRIDE: ${{ inputs.version }}
        run: bash scripts/compute-release-version.sh

  # ---------------------------------------------------------------------------
  # Build, sign, publish, tag, then bump <revision> and commit it back. In
  # recovery mode (tag exists) the deploy/tag/upload steps are skipped and only
  # the bump is re-applied.
  # ---------------------------------------------------------------------------
  build-and-publish:
    needs: check-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      MODULE: ${{ inputs.module }}
      RELEASE_VERSION: ${{ needs.check-version.outputs.release-version }}
      NEXT_DEV: ${{ needs.check-version.outputs.next-dev }}
      RELEASE_TAG: ${{ needs.check-version.outputs.release-tag }}
      # Gate the app-token step on the App key being present (secrets are not
      # allowed in `if:`, env derived from them is).
      APP_KEY: ${{ secrets.GH_BUMP_VERSION_APP_KEY }}
    steps:
      # Mint a GitHub App token so the version-bump push can bypass branch
      # protection. Skipped when the App key is unset; checkout then falls back
      # to GITHUB_TOKEN.
      - name: Prepare app token
        id: app-token
        if: ${{ env.APP_KEY != '' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.GH_BUMP_VERSION_APP_ID }}
          private-key: ${{ secrets.GH_BUMP_VERSION_APP_KEY }}

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          # Persist credentials: the tag and the version-bump commit are pushed
          # at the end via the App token (or GITHUB_TOKEN if the App is unset).
          persist-credentials: true
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: "21"
          distribution: "temurin"
          server-id: ${{ inputs.profile }}
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
          cache: "maven"

      # Pre-install the parent pom so the module deploy below resolves it.
      # (`-pl parent -N` is broken; build the parent pom directly.)
      - name: Install qip-monorepo-parent locally
        if: ${{ needs.check-version.outputs.recover != 'true' }}
        run: mvn --batch-mode -f parent/pom.xml install -N -DskipTests

      - name: Build and deploy module
        if: ${{ needs.check-version.outputs.recover != 'true' }}
        working-directory: ${{ inputs.module }}
        env:
          MAVEN_USERNAME: ${{ inputs.profile == 'github' && github.actor || secrets.MAVEN_USER }}
          MAVEN_PASSWORD: ${{ inputs.profile == 'github' && secrets.GITHUB_TOKEN || secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          MVN_PROFILE: ${{ inputs.profile }}
          EXTRA_ARGS: ${{ inputs.mvn-args }}
          SKIP_GPG: ${{ inputs.profile == 'github' && '-Dgpg.skip=true' || '' }}
        run: |
          set -eu
          # Run from the module dir (not `-pl` from root) so Maven reads only this
          # module + parent, never siblings — micro-engine pulls private
          # com.netcracker.cloud artifacts this token can't read. Publish the
          # computed release version (-Drevision overrides the pom, changelist stripped via -Dchangelist=).
          # shellcheck disable=SC2086
          mvn --batch-mode deploy \
            -P "$MVN_PROFILE" \
            -Drevision="$RELEASE_VERSION" \
            -Dchangelist= \
            $SKIP_GPG \
            $EXTRA_ARGS

      - name: Push release tag
        run: |
          set -eu
          # Idempotent: in recovery (or a re-run) the tag may already exist.
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists — skipping."
          else
            git tag "$RELEASE_TAG"
            git push origin "$RELEASE_TAG"
          fi

      - name: Write released version back to revision and commit
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          set -eu
          POM="$MODULE/pom.xml"
          # Write the released version into <revision>; <changelist> (if any)
          # stays untouched. Always runs (incl. recovery) — commit-and-push.sh
          # no-ops if nothing changed.
          sed -i -E "s#<revision>[0-9]+\.[0-9]+\.[0-9]+</revision>#<revision>${NEXT_DEV}</revision>#" "$POM"
          grep -q "<revision>${NEXT_DEV}</revision>" "$POM" || { echo "::error::Failed to write <revision> in $POM"; exit 1; }
          bash scripts/commit-and-push.sh "chore: $MODULE $RELEASE_VERSION released [skip ci]" "$POM"

      - name: Upload build output
        if: ${{ inputs.build-docker == true && needs.check-version.outputs.recover != 'true' }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ inputs.module }}-jar
          # Upload the whole target/ dir, not selective globs: a single stable
          # root keeps the artifact's internal layout predictable. With separate
          # globs, upload-artifact picks a least-common-ancestor that strips the
          # `target/` (Spring Boot exec jar) or `quarkus-app/` (Quarkus) prefix,
          # which then breaks the Dockerfiles' `COPY target/...` in publish-image.
          path: ${{ inputs.module }}/target
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Docker image build (delegated to the workflow-hub action — unchanged).
  # Skipped in recovery: no jar artifact was produced.
  # ---------------------------------------------------------------------------
  publish-image:
    if: ${{ inputs.build-docker == true && needs.check-version.outputs.recover != 'true' }}
    needs: [check-version, build-and-publish]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Compute image tags
        id: tags
        env:
          REF_NAME: ${{ github.ref_name }}
          VERSION: ${{ needs.check-version.outputs.release-version }}
        run: |
          set -eu
          # We own every tag here (a custom `tags:` bypasses metadata-action's
          # auto tagging). The default branch publishes only the moving :latest;
          # release branches publish the immutable pom version plus a moving
          # branch tag (e.g. :0.5.7, :release-0.5), never :latest. Strip '/'
          # (invalid in a docker tag) from the branch ref.
          if [ "$REF_NAME" = "main" ]; then
            tags="latest"
          else
            branch=$(printf '%s' "$REF_NAME" | tr '/' '-')
            tags="${VERSION},${branch}"
          fi
          echo "list=${tags}" >> "$GITHUB_OUTPUT"

      - name: "Docker Build"
        id: docker_build
        uses: netcracker/qubership-workflow-hub/actions/docker-action@ac0b35120b940eaa644cdcfee7d4957038998ec2 # v2.0.9
        with:
          ref: ${{ github.ref }}
          download-artifact: true
          download-artifact-name: ${{ inputs.module }}-jar
          # Reconstruct <module>/target/... so the Dockerfile's `COPY target/...`
          # resolves against the per-module build context set in `component`.
          download-artifact-path: ${{ inputs.module }}/target
          # Per-module image (the action otherwise defaults to the repo name,
          # colliding). All images are qubership-integration-<module> → derive it.
          custom-image-name: qubership-integration-${{ inputs.module }}
          # The default branch publishes only :latest (infra pulls :latest);
          # release branches publish the immutable version plus their branch
          # tag (:0.5.7, :release-0.5). The action's metadata-action alone
          # would emit only the branch tag.
          tags: ${{ steps.tags.outputs.list }}
          component: '[{"name": "${{ inputs.module }}", "dockerfile": "./${{ inputs.module }}/Dockerfile", "build_context": "./${{ inputs.module }}"}]'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # No GitHub Release here — cut once per drop by release-all.

---

# Reusable Maven module release workflow.
#
# Strategy: CI-friendly versions via Maven properties (${revision} and
# ${changelist}). Each module's pom.xml carries a default <revision>X.Y.Z</revision>
# and <changelist>-SNAPSHOT</changelist>; at release time the workflow overrides
# both via -D and runs a plain `mvn deploy -pl <module>`. flatten-maven-plugin
# (configured in ossrh mode upstream) resolves the placeholders in the published
# POM and inlines the qip-monorepo-parent reference, so consumers never see a
# SNAPSHOT parent. No maven-release-plugin, no release.properties, no
# back-rewrites of pom.xml on main.

name: Maven Module Release (reusable)

on:
  workflow_call:
    inputs:
      module:
        required: true
        type: string
        description: 'Module directory name (e.g. engine, runtime-catalog)'
      version:
        required: true
        type: string
        description: 'Release version (e.g., 0.5.4). Must be X.Y.Z.'
      profile:
        description: 'Maven profile to use (central | github)'
        type: string
        required: false
        default: 'central'
      build-docker:
        description: 'Build Docker image'
        required: false
        default: true
        type: boolean
      create-github-release:
        description: 'Create GitHub release'
        required: false
        default: true
        type: boolean
      mvn-args:
        description: 'Additional maven arguments (e.g. -DskipTests=true)'
        required: false
        default: ''
        type: string
    secrets:
      MAVEN_USER:
        required: false
        description: 'Username for the non-github Maven repository (e.g. Central). Unused when profile=github.'
      MAVEN_PASSWORD:
        required: false
        description: 'Password/token for the non-github Maven repository. Unused when profile=github.'
      MAVEN_GPG_PRIVATE_KEY:
        required: false
        description: 'GPG private key used to sign release artifacts.'
      MAVEN_GPG_PASSPHRASE:
        required: false
        description: 'Passphrase for MAVEN_GPG_PRIVATE_KEY.'

concurrency:
  group: ${{ github.workflow }}-${{ inputs.module }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

env:
  RELEASE_VERSION: ${{ inputs.version }}
  RELEASE_TAG: ${{ inputs.module }}-v${{ inputs.version }}

jobs:
  # ---------------------------------------------------------------------------
  # Preflight: validate version format and ensure tag does not yet exist.
  # ---------------------------------------------------------------------------
  check-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Shallow: the tag check below queries the remote via ls-remote, so we
          # don't need full history here.
          fetch-depth: 1
          persist-credentials: false

      - name: Validate version format
        run: |
          set -eu
          if ! printf '%s\n' "$RELEASE_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be X.Y.Z, got: $RELEASE_VERSION"
            exit 1
          fi

      - name: Check tag does not exist
        run: |
          set -eu
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::Tag $RELEASE_TAG already exists"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Build, sign, and publish the module. Tag is pushed only after deploy.
  # ---------------------------------------------------------------------------
  build-and-publish:
    needs: check-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          # We push the release tag at the end, so we need the default token left
          # in the repo config. The tag push uses the runner's GITHUB_TOKEN.
          persist-credentials: true

      - name: Set up Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: ${{ inputs.profile }}
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
          cache: 'maven'

      # Modules depend on qip-monorepo-parent. With `mvn deploy -pl <module>`
      # (no -am) Maven resolves the parent via relativePath, but the local
      # ~/.m2 repository must also contain it for some plugins. Install the
      # parent at its declared SNAPSHOT version (no -D overrides) so the parent
      # stays consistent across modules.
      - name: Install qip-monorepo-parent locally
        run: mvn --batch-mode install -pl parent -N -DskipTests

      - name: Verify module directory exists
        env:
          MODULE: ${{ inputs.module }}
        run: |
          set -eu
          # Fail fast with a clear message if the module path is wrong; the
          # release version itself is applied later via -Drevision on deploy.
          if [ ! -f "$MODULE/pom.xml" ]; then
            echo "::error::No pom.xml at $MODULE/"
            exit 1
          fi
          echo "Releasing $MODULE as version $RELEASE_VERSION"

      - name: Build and deploy module
        env:
          MAVEN_USERNAME: ${{ inputs.profile == 'github' && github.actor || secrets.MAVEN_USER }}
          MAVEN_PASSWORD: ${{ inputs.profile == 'github' && secrets.GITHUB_TOKEN || secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          MVN_PROFILE: ${{ inputs.profile }}
          MODULE: ${{ inputs.module }}
          EXTRA_ARGS: ${{ inputs.mvn-args }}
          SKIP_GPG: ${{ inputs.profile == 'github' && '-Dgpg.skip=true' || '' }}
        run: |
          set -eu
          # -pl <module> without -am keeps the -Drevision override scoped to
          # this single module; the parent and aggregator (built into the
          # reactor by -am) would otherwise inherit the same revision.
          # shellcheck disable=SC2086
          mvn --batch-mode deploy \
            -pl "$MODULE" \
            -P "$MVN_PROFILE" \
            -Drevision="$RELEASE_VERSION" \
            -Dchangelist= \
            $SKIP_GPG \
            $EXTRA_ARGS

      - name: Create and push release tag
        run: |
          set -eu
          git tag "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"

      - name: Upload build output
        if: ${{ inputs.build-docker == true }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ inputs.module }}-jar
          # Spring Boot modules emit `<artifact>-<version>-exec.jar`; Quarkus
          # (micro-engine) emits a layered `target/quarkus-app/` tree that
          # its Dockerfile copies wholesale.
          path: |
            ${{ inputs.module }}/target/*-exec.jar
            ${{ inputs.module }}/target/quarkus-app/**
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Docker image build (delegated to the workflow-hub action — unchanged).
  # ---------------------------------------------------------------------------
  publish-image:
    if: ${{ inputs.build-docker == true }}
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: "Docker Build"
        id: docker_build
        uses: netcracker/qubership-workflow-hub/actions/docker-action@ac0b35120b940eaa644cdcfee7d4957038998ec2 # v2.0.9
        with:
          ref: ${{ github.ref }}
          download-artifact: true
          download-artifact-name: ${{ inputs.module }}-jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # GitHub Release notes.
  # ---------------------------------------------------------------------------
  create-release:
    if: ${{ inputs.create-github-release == true }}
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.ref }}
      - name: Run Release Drafter
        uses: netcracker/release-drafter@86f4276a3894b5af70480e826c32fe3648ac6a70 # v1.0.0
        with:
          config-name: "release-drafter-config.yml"
          publish: true
          prerelease: ${{ github.ref_name != 'main' }}
          name: '${{ inputs.module }}-${{ inputs.version }}'
          tag: '${{ inputs.module }}-v${{ inputs.version }}'
          version: '${{ inputs.module }}-v${{ inputs.version }}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

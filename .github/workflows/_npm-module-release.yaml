---
# Reusable npm module release workflow.
#
# Model (idiomatic `npm version`): the package.json `version` is the last
# released version. On release we bump it by `release-type` (or use an explicit
# `version` override), publish that version, push the module-scoped git tag
# (<module>-vX.Y.Z), and commit the bumped package.json + the root lockfile back
# to the branch. You never type the version — pick patch/minor/major.
#
# Recovery: if the tag already exists, a previous run published+tagged the
# version but its bump commit never landed. check-version flags recover=true and
# npm-publish skips install/build/publish, re-applying the package.json bump
# only, so a partial failure is self-healing instead of wedging the package.
#
# Cascade (auto patch-bump of the next package in schemas → ui → vscode) lives
# in the CALLER: the wrapper adds a job that calls the next module's release
# workflow with release-type=patch.
#
# PREREQUISITE: the runner's GITHUB_TOKEN must be allowed to push to the target
# branch (bypass branch protection). Without it the version-bump push fails;
# recovery then re-applies it on the next run once the bypass is in place.

name: NPM Module Release (reusable)

on:
  workflow_call:
    inputs:
      module:
        required: true
        type: string
        description: "Workspace dir and tag prefix (e.g. ui). Package is <scope>/qip-<module>."
      release-type:
        description: "patch | minor | major"
        required: false
        type: string
        default: "patch"
      version:
        description: "Explicit release version (X.Y.Z) override. Empty = bump the current package.json version by release-type."
        required: false
        type: string
        default: ""
      scope:
        required: false
        type: string
        default: "@netcracker"
      node-version:
        required: false
        type: string
        default: "22.x"
      registry-url:
        required: false
        type: string
        default: "https://npm.pkg.github.com"
      npm-dist-tag:
        required: false
        type: string
        default: "latest"
      build-schemas:
        required: false
        type: boolean
        default: false
        description: "Build @netcracker/qip-schemas (workspace dep) before the module build. Needed by ui."

concurrency:
  # Literal prefix (NOT github.workflow): inside a reusable, github.workflow is
  # the TOP-LEVEL caller's name, so manual-vs-cascade or wrapper-vs-release-all
  # runs of the same module would land in different groups and race the
  # publish/tag/back-commit. Keying on the module serialises every release path.
  group: qip-release-${{ inputs.module }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  # ---------------------------------------------------------------------------
  # Preflight: derive the release version from the current package.json (or the
  # override). If the tag already exists, enter recovery mode (re-apply the bump
  # only) instead of failing.
  # ---------------------------------------------------------------------------
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release-version: ${{ steps.compute.outputs.release-version }}
      release-tag: ${{ steps.compute.outputs.release-tag }}
      recover: ${{ steps.compute.outputs.recover }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Compute release version
        id: compute
        env:
          ECOSYSTEM: npm
          MODULE: ${{ inputs.module }}
          RELEASE_TYPE: ${{ inputs.release-type }}
          VERSION_OVERRIDE: ${{ inputs.version }}
        run: bash scripts/compute-release-version.sh

  # ---------------------------------------------------------------------------
  # Build, publish (idempotent), tag, then commit the bumped package.json +
  # lockfile back. In recovery mode (tag exists) install/build/publish are
  # skipped and only the bump is re-applied.
  # ---------------------------------------------------------------------------
  npm-publish:
    needs: check-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MODULE: ${{ inputs.module }}
      SCOPE: ${{ inputs.scope }}
      DIST_TAG: ${{ inputs.npm-dist-tag }}
      RELEASE_VERSION: ${{ needs.check-version.outputs.release-version }}
      RELEASE_TAG: ${{ needs.check-version.outputs.release-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          # Tag and the version-bump commit are pushed at the end via GITHUB_TOKEN.
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: ${{ inputs.registry-url }}
          scope: ${{ inputs.scope }}
          cache: "npm"

      - name: Install dependencies (root workspaces)
        # Always (even in recovery): npm version + the lockfile sync below need a
        # consistent install; npm ci is cached and cheap.
        run: npm ci --legacy-peer-deps

      # ui's vite build resolves @netcracker/qip-schemas to its built dist/, so
      # the schemas workspace must be built first. (vscode self-builds it via
      # prepare-deps; schemas itself doesn't need this.)
      - name: Build schemas (workspace dependency)
        if: ${{ inputs.build-schemas && needs.check-version.outputs.recover != 'true' }}
        run: npm -w @netcracker/qip-schemas run build

      - name: Set package version
        working-directory: ${{ inputs.module }}
        run: npm version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version

      - name: Build
        if: ${{ needs.check-version.outputs.recover != 'true' }}
        working-directory: ${{ inputs.module }}
        run: npm run prepublishOnly

      - name: Publish to npm registry (idempotent)
        if: ${{ needs.check-version.outputs.recover != 'true' }}
        working-directory: ${{ inputs.module }}
        run: |
          set -eu
          pkg="$SCOPE/qip-$MODULE"
          if npm view "$pkg@$RELEASE_VERSION" version >/dev/null 2>&1; then
            echo "$pkg@$RELEASE_VERSION already published — skipping."
          else
            npm publish --tag "$DIST_TAG"
          fi

      - name: Push release tag
        run: |
          set -eu
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists — skipping."
          else
            git tag "$RELEASE_TAG"
            git push origin "$RELEASE_TAG"
          fi

      - name: Sync lockfile and commit version bump
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          set -eu
          # Keep the single root lockfile in sync with the bumped workspace
          # version so the next `npm ci` doesn't fail on a mismatch. Always runs
          # (incl. recovery) — commit-and-push.sh no-ops if nothing changed.
          npm install --package-lock-only --legacy-peer-deps
          bash scripts/commit-and-push.sh \
            "chore: $MODULE $RELEASE_VERSION [skip ci]" \
            "$MODULE/package.json" package-lock.json

  # No GitHub Release here — cut once per drop by release-all.

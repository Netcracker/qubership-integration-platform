---
# Reusable npm module release workflow.
#
# Model (idiomatic `npm version`): package.json `version` is the last released
# version. On release we bump it per release-type (or the `version` override),
# publish it, commit the bumped package.json + root lockfile, and tag the bump
# commit (<module>-vX.Y.Z). commit-and-push.sh pushes the tag before the branch,
# so it survives a rejected protected-branch push — the recovery sentinel: tag
# exists => a prior run published but the bump didn't land, so recover=true skips
# install/build/publish and only re-applies the bump.
#
# Cascade (schemas → ui → vscode auto patch-bump) lives in the CALLER's wrapper.
#
# The bump push needs a GitHub App token on the branch-protection bypass list
# (vars.GH_BUMP_VERSION_APP_ID + secrets.GH_BUMP_VERSION_APP_KEY); without it
# GITHUB_TOKEN can't bypass and recovery retries on the next run.

name: NPM Module Release (reusable)

on:
  workflow_call:
    inputs:
      module:
        required: true
        type: string
        description: "Workspace dir and tag prefix (e.g. ui). Package is <scope>/qip-<module>."
      release-type:
        description: "patch | minor | major"
        required: false
        type: string
        default: "patch"
      version:
        description: "Explicit release version (X.Y.Z) override. Empty = bump the current package.json version by release-type."
        required: false
        type: string
        default: ""
      scope:
        required: false
        type: string
        default: "@netcracker"
      node-version:
        required: false
        type: string
        default: "22.x"
      registry-url:
        required: false
        type: string
        default: "https://npm.pkg.github.com"
      npm-dist-tag:
        required: false
        type: string
        default: "latest"
      build-schemas:
        required: false
        type: boolean
        default: false
        description: "Build @netcracker/qip-schemas (workspace dep) before the module build. Needed by ui."
    secrets:
      GH_BUMP_VERSION_APP_KEY:
        required: false
        description: "Private key of the GitHub App that bypasses branch protection for the version-bump push. Falls back to GITHUB_TOKEN if unset."

concurrency:
  # Key on the module, not github.workflow (the caller's name in a reusable), so
  # every release path for a module serialises instead of racing.
  group: qip-release-${{ inputs.module }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  # Preflight: bump package.json version (or use the override); recover if the
  # tag already exists.
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release-version: ${{ steps.compute.outputs.release-version }}
      release-tag: ${{ steps.compute.outputs.release-tag }}
      recover: ${{ steps.compute.outputs.recover }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Compute release version
        id: compute
        env:
          ECOSYSTEM: npm
          MODULE: ${{ inputs.module }}
          RELEASE_TYPE: ${{ inputs.release-type }}
          VERSION_OVERRIDE: ${{ inputs.version }}
        run: bash scripts/compute-release-version.sh

  # Build, publish (idempotent), then commit the bumped package.json + lockfile
  # and tag. Recovery skips install/build/publish and only re-applies the bump.
  npm-publish:
    needs: check-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MODULE: ${{ inputs.module }}
      SCOPE: ${{ inputs.scope }}
      DIST_TAG: ${{ inputs.npm-dist-tag }}
      RELEASE_VERSION: ${{ needs.check-version.outputs.release-version }}
      # Gate the app-token step on the App key being present (secrets are not
      # allowed in `if:`, env derived from them is).
      APP_KEY: ${{ secrets.GH_BUMP_VERSION_APP_KEY }}
    steps:
      # Mint a GitHub App token so the version-bump push can bypass branch
      # protection. Skipped when the App key is unset; checkout then falls back
      # to GITHUB_TOKEN.
      - name: Prepare app token
        id: app-token
        if: ${{ env.APP_KEY != '' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.GH_BUMP_VERSION_APP_ID }}
          private-key: ${{ secrets.GH_BUMP_VERSION_APP_KEY }}

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          # Persist credentials: the tag and the version-bump commit are pushed
          # at the end via the App token (or GITHUB_TOKEN if the App is unset).
          persist-credentials: true
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: ${{ inputs.registry-url }}
          scope: ${{ inputs.scope }}
          cache: "npm"

      - name: Install dependencies (root workspaces)
        # Always (even in recovery): npm version + the lockfile sync below need a
        # consistent install; npm ci is cached and cheap.
        run: npm ci --legacy-peer-deps

      # ui's vite build resolves @netcracker/qip-schemas to its built dist/, so
      # the schemas workspace must be built first. (vscode self-builds it via
      # prepare-deps; schemas itself doesn't need this.)
      - name: Build schemas (workspace dependency)
        if: ${{ inputs.build-schemas && needs.check-version.outputs.recover != 'true' }}
        run: npm -w @netcracker/qip-schemas run build

      - name: Set package version
        working-directory: ${{ inputs.module }}
        run: npm version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version

      - name: Build
        if: ${{ needs.check-version.outputs.recover != 'true' }}
        working-directory: ${{ inputs.module }}
        run: npm run prepublishOnly

      - name: Publish to npm registry (idempotent)
        if: ${{ needs.check-version.outputs.recover != 'true' }}
        working-directory: ${{ inputs.module }}
        run: |
          set -eu
          pkg="$SCOPE/qip-$MODULE"
          if npm view "$pkg@$RELEASE_VERSION" version >/dev/null 2>&1; then
            echo "$pkg@$RELEASE_VERSION already published — skipping."
          else
            npm publish --tag "$DIST_TAG"
          fi

      - name: Sync lockfile, tag, and commit version bump
        env:
          BRANCH: ${{ github.ref_name }}
          TAG: ${{ needs.check-version.outputs.release-tag }}
        run: |
          set -eu
          # Sync the root lockfile with the bumped version so the next `npm ci`
          # doesn't fail on a mismatch. TAG tags this bump commit and pushes it
          # first (see the script). Runs in recovery too — no-ops if unchanged.
          npm install --package-lock-only --legacy-peer-deps
          bash scripts/commit-and-push.sh \
            "chore: $MODULE $RELEASE_VERSION [skip ci]" \
            "$MODULE/package.json" package-lock.json

  # No GitHub Release here — cut once per drop by release-all.

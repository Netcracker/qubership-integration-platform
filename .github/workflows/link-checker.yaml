---
name: Link Checker

# Links only change when docs change, so run the check exactly then:
# on PRs touching Markdown, on Markdown landing on main, or on demand.
on:
  pull_request:
    paths:
      - '**/*.md'
  push:
    branches:
      - main
    paths:
      - '**/*.md'
  workflow_dispatch: null
permissions:
  contents: read
jobs:
  linkChecker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@a8c4c7cb88f0c7386610c35eb25108e448569cb0 # v2.7.0
        with:
          # conventionalcommits.org sits behind a bot-protected CDN that
          # intermittently TCP-resets CI runners (no HTTP status, so --accept
          # can't catch it). The link is stable and well-known — exclude it like
          # iana.org rather than flake the check on every PR.
          args: --root-dir ${{ github.workspace }} --verbose --no-progress --exclude-loopback --exclude 'iana\.org' --exclude 'conventionalcommits\.org' './**/*.md' --accept 100..=103,200..=299,429
          format: markdown
          fail: true

---
name: Link Checker

# Links only change when docs change, so run the check exactly then:
# on PRs touching Markdown, on Markdown landing on main, or on demand.
on:
  pull_request:
    paths:
      - '**/*.md'
  push:
    branches:
      - main
    paths:
      - '**/*.md'
  workflow_dispatch: null
permissions:
  contents: read
jobs:
  linkChecker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@a8c4c7cb88f0c7386610c35eb25108e448569cb0 # v2.7.0
        with:
          args: --root-dir ${{ github.workspace }} --verbose --no-progress --exclude-loopback --exclude 'iana\.org' './**/*.md' --accept 100..=103,200..=299,429
          format: markdown
          fail: true

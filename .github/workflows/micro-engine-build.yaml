name: Micro Engine Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'micro-engine/**'
      - 'pom.xml'

permissions: {}

jobs:
  build:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_maven-module-build.yaml
    with:
      module: micro-engine
      sonar-project-key: ${{ vars.SONAR_MICRO_ENGINE_PROJECT_KEY }}
    secrets: inherit

name: Micro Engine Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'micro-engine/**'
      - 'pom.xml'

permissions: {}

jobs:
  build:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_maven-module-build.yaml
    with:
      module: micro-engine
      sonar-project-key: ${{ vars.SONAR_MICRO_ENGINE_PROJECT_KEY }}
      # micro-engine's private com.netcracker.cloud deps resolve via the flaky
      # GitHub Packages OWNER/* wildcard; -U stops a transient miss from being
      # negative-cached and stuck across runs.
      force-update: true
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

---
# micro-engine is the only module with private com.netcracker.cloud.* deps
# (pulled from maven.pkg.github.com/netcracker/*). They are not on Maven Central,
# so micro-engine is published to GitHub Packages: the `github` profile both
# authenticates the read of those private deps (server-id=github + GITHUB_TOKEN)
# and targets the github distributionManagement. There is therefore no profile
# choice here — it is fixed to `github`.

name: Micro Engine Release

on:
  workflow_call:
    inputs:
      release-type:
        description: "patch | minor | major"
        required: false
        type: string
        default: "patch"
      version:
        description: "Explicit release version (X.Y.Z) override. Empty = bump current <revision> by release-type."
        required: false
        type: string
        default: ""
      build-docker:
        description: "Build Docker image"
        required: false
        default: true
        type: boolean
      create-github-release:
        description: "Create release"
        required: false
        default: true
        type: boolean
      mvn-args:
        description: "Additional maven arguments to pass (e.g. -DskipTests=true -Dmaven.javadoc.skip=true)"
        required: false
        default: ""
        type: string
  workflow_dispatch:
    inputs:
      release-type:
        description: "Release type (ignored if a version override is given)"
        type: choice
        options:
          - "patch"
          - "minor"
          - "major"
        required: false
        default: "patch"
      version:
        description: "Explicit release version (X.Y.Z) override. Empty = bump current <revision> by release-type."
        required: false
        default: ""
        type: string
      build-docker:
        description: "Build Docker image"
        required: false
        default: true
        type: boolean
      create-github-release:
        description: "Create release"
        required: false
        default: true
        type: boolean
      mvn-args:
        description: "Additional maven arguments to pass (e.g. -DskipTests=true -Dmaven.javadoc.skip=true)"
        required: false
        default: ""
        type: string

permissions: {}

jobs:
  release:
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/_maven-module-release.yaml
    with:
      module: micro-engine
      release-type: ${{ inputs.release-type }}
      version: ${{ inputs.version }}
      # Fixed to github: private com.netcracker.cloud deps are not on Central.
      profile: github
      build-docker: ${{ inputs.build-docker }}
      create-github-release: ${{ inputs.create-github-release }}
      mvn-args: ${{ inputs.mvn-args }}

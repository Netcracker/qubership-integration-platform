---

# One-click platform release workflow.
# Releases all modules in parallel, creates a platform tag, and bumps versions to next SNAPSHOT.

name: Platform Release

run-name: 'Platform release v${{ inputs.version }}'

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
        description: 'Platform release version (e.g., 0.5.0)'
      profile:
        description: 'Maven profile to use'
        type: choice
        options:
          - 'central'
          - 'github'
        required: false
        default: 'central'
      build-docker:
        description: 'Build Docker images'
        required: false
        default: true
        type: boolean
      create-github-release:
        description: 'Create GitHub Release'
        required: false
        default: true
        type: boolean
      mvn-args:
        description: 'Additional Maven arguments'
        required: false
        default: ''
        type: string

permissions: {}

jobs:
  # ---- Phase 1: Validate ----
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check tags do not exist
        run: |
          for tag in "v${{ inputs.version }}" \
                     "engine/v${{ inputs.version }}" \
                     "runtime-catalog/v${{ inputs.version }}" \
                     "sessions-management/v${{ inputs.version }}"; do
            if git rev-parse "$tag" >/dev/null 2>&1; then
              echo "::error::Tag $tag already exists"
              exit 1
            fi
            echo "✓ Tag $tag does not exist"
          done

  # ---- Phase 2: Release modules (parallel) ----
  release-engine:
    needs: validate
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/module-release.yaml
    with:
      module-dir: 'engine'
      version: ${{ inputs.version }}
      profile: ${{ inputs.profile }}
      build-docker: ${{ inputs.build-docker }}
      create-tag: true
      mvn-args: ${{ inputs.mvn-args }}
    secrets:
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      MAVEN_USER: ${{ secrets.MAVEN_USER }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}

  release-runtime-catalog:
    needs: validate
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/module-release.yaml
    with:
      module-dir: 'runtime-catalog'
      version: ${{ inputs.version }}
      profile: ${{ inputs.profile }}
      build-docker: ${{ inputs.build-docker }}
      create-tag: true
      mvn-args: ${{ inputs.mvn-args }}
    secrets:
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      MAVEN_USER: ${{ secrets.MAVEN_USER }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}

  release-sessions-management:
    needs: validate
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/module-release.yaml
    with:
      module-dir: 'sessions-management'
      version: ${{ inputs.version }}
      profile: ${{ inputs.profile }}
      build-docker: ${{ inputs.build-docker }}
      create-tag: true
      mvn-args: ${{ inputs.mvn-args }}
    secrets:
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      MAVEN_USER: ${{ secrets.MAVEN_USER }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}

  # ---- Phase 3: Platform tag + GitHub Release ----
  create-platform-tag:
    needs: [release-engine, release-runtime-catalog, release-sessions-management]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Create platform tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ inputs.version }}" -m "Platform release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

  create-github-release:
    if: inputs.create-github-release
    needs: create-platform-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.ref }}

      - name: Create GitHub Release
        uses: netcracker/release-drafter@86f4276a3894b5af70480e826c32fe3648ac6a70 # v1.0.0
        with:
          config-name: 'release-drafter-config.yml'
          publish: true
          prerelease: ${{ github.ref_name != 'main' }}
          name: 'v${{ inputs.version }}'
          tag: 'v${{ inputs.version }}'
          version: 'v${{ inputs.version }}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---- Phase 4: Bump to next SNAPSHOT ----
  bump-versions:
    needs: create-platform-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Compute next SNAPSHOT version
        id: next
        run: |
          IFS='.' read -r major minor patch <<< "${{ inputs.version }}"
          echo "snapshot=${major}.${minor}.$((patch + 1))-SNAPSHOT" >> "$GITHUB_OUTPUT"

      - name: Bump all modules to next SNAPSHOT
        run: |
          for module in engine runtime-catalog sessions-management; do
            mvn -f "${module}/pom.xml" versions:set \
              -DnewVersion=${{ steps.next.outputs.snapshot }} \
              -DgenerateBackupPoms=false \
              --batch-mode
          done

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add engine/pom.xml runtime-catalog/pom.xml sessions-management/pom.xml
          git commit -m "chore: bump all modules to ${{ steps.next.outputs.snapshot }} [skip ci]"
          git push

name: Release All

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
      modules:
        description: 'Modules to release (comma-separated, or "all" for everything)'
        required: false
        default: 'all'
        type: string
      profile:
        description: 'Maven profile'
        type: choice
        options:
          - 'central'
          - 'github'
        required: false
        default: 'central'
      build-docker:
        description: 'Build Docker images for applicable modules'
        required: false
        default: true
        type: boolean
      create-github-release:
        description: 'Create GitHub release'
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release-engine: ${{ steps.check.outputs.engine }}
      release-micro-engine: ${{ steps.check.outputs.micro-engine }}
      release-runtime-catalog: ${{ steps.check.outputs.runtime-catalog }}
      release-sessions-management: ${{ steps.check.outputs.sessions-management }}
      release-ui: ${{ steps.check.outputs.ui }}
      release-vscode-extension: ${{ steps.check.outputs.vscode-extension }}
    steps:
      - name: Determine modules to release
        id: check
        env:
          MODULES: ${{ inputs.modules }}
        run: |
          set -eu
          # schemas and checkstyle are released manually (rare cadence) — not part of release-all.
          ALL_MODULES="engine micro-engine runtime-catalog sessions-management ui vscode-extension"

          # Normalise input: strip spaces, wrap with commas so we can match whole tokens.
          requested=",${MODULES// /},"

          # Reject unknown tokens so a typo (or a manually-released module like
          # schemas/checkstyle) fails loudly instead of being silently dropped.
          if [[ "$MODULES" != "all" ]]; then
            known=",${ALL_MODULES// /},"
            IFS=',' read -ra tokens <<< "${MODULES// /}"
            for tok in "${tokens[@]}"; do
              [ -z "$tok" ] && continue
              if [[ "$known" != *",${tok},"* ]]; then
                echo "::error::Unknown module '$tok'. Valid: $ALL_MODULES (or 'all'). schemas and checkstyle have their own release workflows."
                exit 1
              fi
            done
          fi

          for mod in $ALL_MODULES; do
            if [[ "$MODULES" == "all" ]] || [[ "$requested" == *",${mod},"* ]]; then
              echo "${mod}=true" >> "$GITHUB_OUTPUT"
            else
              echo "${mod}=false" >> "$GITHUB_OUTPUT"
            fi
          done

  release-engine:
    needs: prepare
    if: needs.prepare.outputs.release-engine == 'true'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/engine-release.yaml
    with:
      version: ${{ inputs.version }}
      profile: ${{ inputs.profile }}
      build-docker: ${{ inputs.build-docker }}
      create-github-release: ${{ inputs.create-github-release }}
    secrets:
      MAVEN_USER: ${{ secrets.MAVEN_USER }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  release-micro-engine:
    needs: prepare
    if: needs.prepare.outputs.release-micro-engine == 'true'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/micro-engine-release.yaml
    with:
      version: ${{ inputs.version }}
      profile: ${{ inputs.profile }}
      build-docker: ${{ inputs.build-docker }}
      create-github-release: ${{ inputs.create-github-release }}
    secrets:
      MAVEN_USER: ${{ secrets.MAVEN_USER }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  release-runtime-catalog:
    needs: prepare
    if: needs.prepare.outputs.release-runtime-catalog == 'true'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/runtime-catalog-release.yaml
    with:
      version: ${{ inputs.version }}
      profile: ${{ inputs.profile }}
      build-docker: ${{ inputs.build-docker }}
      create-github-release: ${{ inputs.create-github-release }}
    secrets:
      MAVEN_USER: ${{ secrets.MAVEN_USER }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  release-sessions-management:
    needs: prepare
    if: needs.prepare.outputs.release-sessions-management == 'true'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/sessions-management-release.yaml
    with:
      version: ${{ inputs.version }}
      profile: ${{ inputs.profile }}
      build-docker: ${{ inputs.build-docker }}
      create-github-release: ${{ inputs.create-github-release }}
    secrets:
      MAVEN_USER: ${{ secrets.MAVEN_USER }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  release-ui:
    needs: prepare
    if: needs.prepare.outputs.release-ui == 'true'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/ui-release.yaml
    with:
      version: ${{ inputs.version }}
      create-github-release: ${{ inputs.create-github-release }}

  release-vscode-extension:
    needs: [prepare, release-ui]
    if: always() && needs.prepare.outputs.release-vscode-extension == 'true' && (needs.release-ui.result == 'success' || needs.release-ui.result == 'skipped')
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/vscode-extension-release.yaml
    with:
      version: ${{ inputs.version }}
      create-github-release: ${{ inputs.create-github-release }}

  # ---------------------------------------------------------------------------
  # Bill of Materials: snapshot the released version of every module (derived
  # from the git tags the release jobs just pushed) and attach it as an artifact.
  # ---------------------------------------------------------------------------
  publish-bom:
    needs:
      - prepare
      - release-engine
      - release-micro-engine
      - release-runtime-catalog
      - release-sessions-management
      - release-ui
      - release-vscode-extension
    # Run after every release attempt, regardless of which were skipped/failed,
    # so the BOM reflects whatever was actually tagged. Skip only if the module
    # selection itself failed validation.
    if: ${{ always() && !cancelled() && needs.prepare.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Generate release BOM from git tags
        run: bash scripts/build-bom.sh | tee release-manifest.json
      - name: Upload release manifest
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: release-manifest
          path: release-manifest.json
          if-no-files-found: error

name: Release All

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: "Release type for the whole wave: patch | minor | major (each module bumps its own version)"
        type: choice
        options:
          - "patch"
          - "minor"
          - "major"
        required: false
        default: "patch"
      modules:
        description: 'Modules to release (comma-separated, or "all" for everything)'
        required: false
        default: "all"
        type: string
      profile:
        description: "Maven profile"
        type: choice
        options:
          - "central"
          - "github"
        required: false
        default: "central"
      build-docker:
        description: "Build Docker images for applicable modules"
        required: false
        default: true
        type: boolean
      create-github-release:
        description: "Publish one combined GitHub Release for this wave, tagged v<platform-version>. Off = release the modules only, with no combined release."
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release-engine: ${{ steps.check.outputs.engine }}
      release-micro-engine: ${{ steps.check.outputs.micro-engine }}
      release-runtime-catalog: ${{ steps.check.outputs.runtime-catalog }}
      release-sessions-management: ${{ steps.check.outputs.sessions-management }}
      release-ui: ${{ steps.check.outputs.ui }}
      release-vscode-extension: ${{ steps.check.outputs.vscode-extension }}
    steps:
      - name: Determine modules to release
        id: check
        env:
          MODULES: ${{ inputs.modules }}
        run: |
          set -eu
          # schemas and checkstyle are released manually (rare cadence) — not part of release-all.
          ALL_MODULES="engine micro-engine runtime-catalog sessions-management ui vscode-extension"

          # Normalise input: strip spaces, wrap with commas so we can match whole tokens.
          requested=",${MODULES// /},"

          # Reject unknown tokens so a typo (or a manually-released module like
          # schemas/checkstyle) fails loudly instead of being silently dropped.
          if [[ "$MODULES" != "all" ]]; then
            known=",${ALL_MODULES// /},"
            IFS=',' read -ra tokens <<< "${MODULES// /}"
            for tok in "${tokens[@]}"; do
              [ -z "$tok" ] && continue
              if [[ "$known" != *",${tok},"* ]]; then
                echo "::error::Unknown module '$tok'. Valid: $ALL_MODULES (or 'all'). schemas and checkstyle have their own release workflows."
                exit 1
              fi
            done
          fi

          for mod in $ALL_MODULES; do
            if [[ "$MODULES" == "all" ]] || [[ "$requested" == *",${mod},"* ]]; then
              echo "${mod}=true" >> "$GITHUB_OUTPUT"
            else
              echo "${mod}=false" >> "$GITHUB_OUTPUT"
            fi
          done

  release-engine:
    needs: prepare
    if: needs.prepare.outputs.release-engine == 'true'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/engine-release.yaml
    with:
      release-type: ${{ inputs.release-type }}
      profile: ${{ inputs.profile }}
      build-docker: ${{ inputs.build-docker }}
    secrets:
      MAVEN_USER: ${{ secrets.MAVEN_USER }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      GH_BUMP_VERSION_APP_KEY: ${{ secrets.GH_BUMP_VERSION_APP_KEY }}

  release-micro-engine:
    needs: prepare
    if: needs.prepare.outputs.release-micro-engine == 'true'
    permissions:
      contents: write
      packages: write
    # micro-engine publishes to GitHub Packages (private com.netcracker.cloud
    # deps are not on Central); its wrapper fixes profile=github and needs no
    # Central/GPG secrets.
    uses: ./.github/workflows/micro-engine-release.yaml
    with:
      release-type: ${{ inputs.release-type }}
      build-docker: ${{ inputs.build-docker }}
    secrets:
      GH_BUMP_VERSION_APP_KEY: ${{ secrets.GH_BUMP_VERSION_APP_KEY }}

  release-runtime-catalog:
    needs: prepare
    if: needs.prepare.outputs.release-runtime-catalog == 'true'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/runtime-catalog-release.yaml
    with:
      release-type: ${{ inputs.release-type }}
      profile: ${{ inputs.profile }}
      build-docker: ${{ inputs.build-docker }}
    secrets:
      MAVEN_USER: ${{ secrets.MAVEN_USER }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      GH_BUMP_VERSION_APP_KEY: ${{ secrets.GH_BUMP_VERSION_APP_KEY }}

  release-sessions-management:
    needs: prepare
    if: needs.prepare.outputs.release-sessions-management == 'true'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/sessions-management-release.yaml
    with:
      release-type: ${{ inputs.release-type }}
      profile: ${{ inputs.profile }}
      build-docker: ${{ inputs.build-docker }}
    secrets:
      MAVEN_USER: ${{ secrets.MAVEN_USER }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      GH_BUMP_VERSION_APP_KEY: ${{ secrets.GH_BUMP_VERSION_APP_KEY }}

  release-ui:
    needs: prepare
    if: needs.prepare.outputs.release-ui == 'true'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/ui-release.yaml
    with:
      release-type: ${{ inputs.release-type }}
    secrets:
      GH_BUMP_VERSION_APP_KEY: ${{ secrets.GH_BUMP_VERSION_APP_KEY }}

  release-vscode-extension:
    needs: [prepare, release-ui]
    if: always() && needs.prepare.outputs.release-vscode-extension == 'true' && (needs.release-ui.result == 'success' || needs.release-ui.result == 'skipped')
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/vscode-extension-release.yaml
    with:
      release-type: ${{ inputs.release-type }}
    secrets:
      GH_BUMP_VERSION_APP_KEY: ${{ secrets.GH_BUMP_VERSION_APP_KEY }}

  # ---------------------------------------------------------------------------
  # Bill of Materials: snapshot the released version of every module (derived
  # from the git tags the release jobs just pushed) and attach it as an artifact.
  # ---------------------------------------------------------------------------
  publish-bom:
    needs:
      - prepare
      - release-engine
      - release-micro-engine
      - release-runtime-catalog
      - release-sessions-management
      - release-ui
      - release-vscode-extension
    # Run after every release attempt, regardless of which were skipped/failed,
    # so the BOM reflects whatever was actually tagged. Skip only if the module
    # selection itself failed validation.
    if: ${{ always() && !cancelled() && needs.prepare.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Generate release BOM from git tags
        run: bash scripts/build-bom.sh | tee release-manifest.json
      - name: Upload release manifest
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: release-manifest
          path: release-manifest.json
          if-no-files-found: error

  # The one GitHub Release per wave (tag v<platform-version>); module jobs only tag.
  create-drop-release:
    needs:
      - prepare
      - release-engine
      - release-micro-engine
      - release-runtime-catalog
      - release-sessions-management
      - release-ui
      - release-vscode-extension
    # Not always(): a failed module must not still cut a drop + bump the version.
    if: ${{ !cancelled() && !failure() && inputs.create-github-release && needs.prepare.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    env:
      # Gate the app-token step on the App key being present (secrets are not
      # allowed in `if:`, env derived from them is).
      APP_KEY: ${{ secrets.GH_BUMP_VERSION_APP_KEY }}
    steps:
      # Mint a GitHub App token so the platform-version bump push can bypass
      # branch protection. Skipped when the App key is unset; checkout then falls
      # back to GITHUB_TOKEN.
      - name: Prepare app token
        id: app-token
        if: ${{ env.APP_KEY != '' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.GH_BUMP_VERSION_APP_ID }}
          private-key: ${{ secrets.GH_BUMP_VERSION_APP_KEY }}

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          # Persist credentials: the platform-version bump commit is pushed back
          # at the end via the App token (or GITHUB_TOKEN if the App is unset).
          persist-credentials: true
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
      - name: Create platform drop release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_TYPE: ${{ inputs.release-type }}
          PRERELEASE: ${{ github.ref_name != 'main' }}
          BRANCH: ${{ github.ref_name }}
        run: bash scripts/build-drop-release.sh

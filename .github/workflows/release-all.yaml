name: Release All

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: "Release type for the whole wave: patch | minor | major"
        type: choice
        options:
          - "patch"
          - "minor"
          - "major"
        required: false
        default: "patch"
      profile:
        description: "Maven profile"
        type: choice
        options:
          - "central"
          - "github"
        required: false
        default: "central"
      build-docker:
        description: "Build Docker images for applicable modules"
        required: false
        default: true
        type: boolean
      create-github-release:
        description: "Create GitHub release"
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release-engine:
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/engine-release.yaml
    with:
      release-type: ${{ inputs.release-type }}
      profile: ${{ inputs.profile }}
      build-docker: ${{ inputs.build-docker }}
      create-github-release: ${{ inputs.create-github-release }}
    secrets:
      MAVEN_USER: ${{ secrets.MAVEN_USER }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      GH_BUMP_VERSION_APP_KEY: ${{ secrets.GH_BUMP_VERSION_APP_KEY }}

  release-runtime-catalog:
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/runtime-catalog-release.yaml
    with:
      release-type: ${{ inputs.release-type }}
      profile: ${{ inputs.profile }}
      build-docker: ${{ inputs.build-docker }}
      create-github-release: ${{ inputs.create-github-release }}
    secrets:
      MAVEN_USER: ${{ secrets.MAVEN_USER }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      GH_BUMP_VERSION_APP_KEY: ${{ secrets.GH_BUMP_VERSION_APP_KEY }}

  release-sessions-management:
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/sessions-management-release.yaml
    with:
      release-type: ${{ inputs.release-type }}
      profile: ${{ inputs.profile }}
      build-docker: ${{ inputs.build-docker }}
      create-github-release: ${{ inputs.create-github-release }}
    secrets:
      MAVEN_USER: ${{ secrets.MAVEN_USER }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      GH_BUMP_VERSION_APP_KEY: ${{ secrets.GH_BUMP_VERSION_APP_KEY }}

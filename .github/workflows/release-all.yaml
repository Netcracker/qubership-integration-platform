name: Release All

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
      modules:
        description: 'Modules to release (comma-separated, or "all" for everything)'
        required: false
        default: 'all'
        type: string
      profile:
        description: 'Maven profile'
        type: choice
        options:
          - 'central'
          - 'github'
        required: false
        default: 'central'
      build-docker:
        description: 'Build Docker images for applicable modules'
        required: false
        default: true
        type: boolean
      create-github-release:
        description: 'Create GitHub release'
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release-engine: ${{ steps.check.outputs.engine }}
      release-micro-engine: ${{ steps.check.outputs.micro-engine }}
      release-runtime-catalog: ${{ steps.check.outputs.runtime-catalog }}
      release-sessions-management: ${{ steps.check.outputs.sessions-management }}
      release-ui: ${{ steps.check.outputs.ui }}
      release-vscode-extension: ${{ steps.check.outputs.vscode-extension }}
    steps:
      - name: Determine modules to release
        id: check
        env:
          MODULES: ${{ inputs.modules }}
        run: |
          # schemas and checkstyle are released manually (rare cadence) — not part of release-all.
          ALL_MODULES="engine micro-engine runtime-catalog sessions-management ui vscode-extension"

          # Normalise input: strip spaces, wrap with commas so we can match whole tokens.
          requested=",${MODULES// /},"

          for mod in $ALL_MODULES; do
            if [[ "$MODULES" == "all" ]] || [[ "$requested" == *",${mod},"* ]]; then
              echo "${mod}=true" >> "$GITHUB_OUTPUT"
            else
              echo "${mod}=false" >> "$GITHUB_OUTPUT"
            fi
          done

  release-engine:
    needs: prepare
    if: needs.prepare.outputs.release-engine == 'true'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/engine-release.yaml
    with:
      version: ${{ inputs.version }}
      profile: ${{ inputs.profile }}
      build-docker: ${{ inputs.build-docker }}
      create-github-release: ${{ inputs.create-github-release }}
    secrets:
      MAVEN_USER: ${{ secrets.MAVEN_USER }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  release-micro-engine:
    needs: prepare
    if: needs.prepare.outputs.release-micro-engine == 'true'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/micro-engine-release.yaml
    with:
      version: ${{ inputs.version }}
      profile: ${{ inputs.profile }}
      build-docker: ${{ inputs.build-docker }}
      create-github-release: ${{ inputs.create-github-release }}
    secrets:
      MAVEN_USER: ${{ secrets.MAVEN_USER }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  release-runtime-catalog:
    needs: prepare
    if: needs.prepare.outputs.release-runtime-catalog == 'true'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/runtime-catalog-release.yaml
    with:
      version: ${{ inputs.version }}
      profile: ${{ inputs.profile }}
      build-docker: ${{ inputs.build-docker }}
      create-github-release: ${{ inputs.create-github-release }}
    secrets:
      MAVEN_USER: ${{ secrets.MAVEN_USER }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  release-sessions-management:
    needs: prepare
    if: needs.prepare.outputs.release-sessions-management == 'true'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/sessions-management-release.yaml
    with:
      version: ${{ inputs.version }}
      profile: ${{ inputs.profile }}
      build-docker: ${{ inputs.build-docker }}
      create-github-release: ${{ inputs.create-github-release }}
    secrets:
      MAVEN_USER: ${{ secrets.MAVEN_USER }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  release-ui:
    needs: prepare
    if: needs.prepare.outputs.release-ui == 'true'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/ui-release.yaml
    with:
      version: ${{ inputs.version }}
      create-github-release: ${{ inputs.create-github-release }}

  release-vscode-extension:
    needs: [prepare, release-ui]
    if: always() && needs.prepare.outputs.release-vscode-extension == 'true' && (needs.release-ui.result == 'success' || needs.release-ui.result == 'skipped')
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/vscode-extension-release.yaml
    with:
      version: ${{ inputs.version }}
      create-github-release: ${{ inputs.create-github-release }}

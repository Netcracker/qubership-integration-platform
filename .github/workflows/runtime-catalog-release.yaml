---

name: Runtime Catalog Release

run-name: 'Runtime Catalog release v${{ inputs.version }}'

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        default: '1.0.0'
        type: string
        description: 'Release version (e.g., 1.0.0)'
      profile:
        description: 'Maven profile to use'
        type: choice
        options:
          - 'central'
          - 'github'
        required: false
        default: 'central'
      build-docker:
        description: 'Build Docker image'
        required: false
        default: true
        type: boolean
      create-github-release:
        description: 'Create GitHub Release'
        required: false
        default: true
        type: boolean
      mvn-args:
        description: 'Additional Maven arguments'
        required: false
        default: ''
        type: string

permissions: {}

jobs:
  release:
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/module-release.yaml
    with:
      module-dir: 'runtime-catalog'
      version: ${{ inputs.version }}
      profile: ${{ inputs.profile }}
      build-docker: ${{ inputs.build-docker }}
      create-tag: true
      mvn-args: ${{ inputs.mvn-args }}
    secrets:
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      MAVEN_USER: ${{ secrets.MAVEN_USER }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}

  create-github-release:
    if: inputs.create-github-release
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Create GitHub Release
        uses: netcracker/release-drafter@86f4276a3894b5af70480e826c32fe3648ac6a70 # v1.0.0
        with:
          config-name: 'release-drafter-config.yml'
          publish: true
          prerelease: ${{ github.ref_name != 'main' }}
          name: 'runtime-catalog/v${{ inputs.version }}'
          tag: 'runtime-catalog/v${{ inputs.version }}'
          version: 'runtime-catalog/v${{ inputs.version }}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

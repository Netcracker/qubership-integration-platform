---
# Release the schemas module as a Maven artifact (ZIP + sources + javadoc,
# GPG-signed) to Maven Central via the shared _maven-module-release workflow.
# Pick patch/minor/major; the version is derived from the pom <revision> and
# bumped automatically.
#
# This Maven version line (0.0.x) is INDEPENDENT of the npm version in
# package.json (schemas-release.yaml, 0.2.x). The two share the schemas-v* tag
# prefix but the lines never overlap, so the tags never collide.
#
# Not part of release-all (rare, manual cadence). build-docker is false: schemas
# is a library, not a service image.

name: Schemas Maven Release (Central)

run-name: Schemas Maven Release (${{ inputs.release-type }})

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: "Release type (ignored if a version override is given)"
        type: choice
        options:
          - "patch"
          - "minor"
          - "major"
        required: false
        default: "patch"
      version:
        description: "Explicit release version (X.Y.Z) override. Empty = release the current <revision>, bump by release-type."
        required: false
        default: ""
        type: string
      profile:
        description: "Maven profile to use"
        type: choice
        options:
          - "central"
          - "github"
        required: false
        default: "central"
      mvn-args:
        description: "Additional maven arguments (e.g. -DskipTests=true)"
        required: false
        default: ""
        type: string

permissions: {}

jobs:
  release:
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/_maven-module-release.yaml
    with:
      module: schemas
      release-type: ${{ inputs.release-type }}
      version: ${{ inputs.version }}
      profile: ${{ inputs.profile }}
      build-docker: false
      mvn-args: ${{ inputs.mvn-args }}
    secrets:
      MAVEN_USER: ${{ secrets.MAVEN_USER }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

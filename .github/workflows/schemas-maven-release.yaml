---
# Rare, manual publish of the schemas module as a Maven artifact (ZIP + sources
# + javadoc, GPG-signed) to Maven Central.
#
# schemas normally ships to npm via schemas-release.yaml; this is the ~twice-a-
# year Central publish. Central only — no GitHub Packages. The git tag and
# GitHub release belong to the npm release, so this workflow only publishes.

name: Schemas Maven Release (Central)

run-name: Schemas Maven Release ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
        description: "Release version (e.g., 0.3.0). Must be X.Y.Z."

permissions: {}

jobs:
  maven-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RELEASE_VERSION: ${{ inputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Validate version format
        run: |
          set -eu
          if ! printf '%s\n' "$RELEASE_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be X.Y.Z, got: $RELEASE_VERSION"
            exit 1
          fi

      - name: Set up Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          java-version: "21"
          distribution: "temurin"
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
          cache: "maven"

      - name: Set Maven version
        working-directory: schemas
        run: mvn --batch-mode versions:set -DnewVersion="$RELEASE_VERSION" -DgenerateBackupPoms=false

      - name: Deploy to Maven Central
        working-directory: schemas
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USER }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        # Always signed; central profile carries the central-publishing plugin.
        run: mvn --batch-mode deploy -P central

---

name: Schemas Release

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: 'Release version (e.g., 1.0.0)'
      version-type:
        description: 'Version type to release'
        type: string
        required: false
        default: 'patch'
      profile:
        description: 'Maven profile to use'
        type: string
        required: false
        default: 'central'
      build-docker:
        description: 'Build Docker image'
        required: false
        default: false
        type: boolean
      create-github-release:
        description: 'Create release'
        required: false
        default: true
        type: boolean
      mvn-args:
        description: 'Additional maven arguments to pass (e.g. -DskipTests=true -Dmaven.javadoc.skip=true)'
        required: false
        default: ''
        type: string
    secrets:
      MAVEN_USER:
        required: false
      MAVEN_PASSWORD:
        required: false
      MAVEN_GPG_PRIVATE_KEY:
        required: false
      MAVEN_GPG_PASSPHRASE:
        required: false
  workflow_dispatch:
    inputs:
      version:
        required: true
        default: '1.0.0'
        type: string
        description: 'Release version (e.g., 1.0.0)'
      version-type:
        description: 'Version type to release'
        type: choice
        options:
          - 'major'
          - 'minor'
          - 'patch'
        required: true
        default: 'patch'
      profile:
        description: 'Maven profile to use'
        type: choice
        options:
          - 'github'
          - 'central'
        required: false
        default: 'central'
      build-docker:
        description: 'Build Docker image'
        required: false
        default: false
        type: boolean
      create-github-release:
        description: 'Create release'
        required: false
        default: true
        type: boolean
      mvn-args:
        description: 'Additional maven arguments to pass (e.g. -DskipTests=true -Dmaven.javadoc.skip=true)'
        required: false
        default: ''
        type: string

permissions: {}

jobs:
  release:
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/_maven-module-release.yaml
    with:
      module: schemas
      version: ${{ inputs.version }}
      version-type: ${{ inputs.version-type }}
      profile: ${{ inputs.profile }}
      build-docker: ${{ inputs.build-docker }}
      create-github-release: ${{ inputs.create-github-release }}
      mvn-args: ${{ inputs.mvn-args }}
    secrets:
      MAVEN_USER: ${{ secrets.MAVEN_USER }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

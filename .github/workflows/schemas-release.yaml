---
# Release the schemas module as an npm package (@netcracker/qip-schemas) via the
# shared _npm-module-release workflow, then optionally cascade to ui (and on to
# vscode-extension).
#
# This is the COMMON case — schemas ships to npm frequently. The rare Maven
# Central publish (~twice a year, manual) lives in schemas-maven-release.yaml.

name: Schemas Release

run-name: Schemas Release ${{ inputs.version }}

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: "Release version (e.g., 0.3.0)"
      npm-dist-tag:
        required: false
        type: string
        default: "latest"
      create-github-release:
        required: false
        type: boolean
        default: true
      cascade-ui:
        required: false
        type: boolean
        default: false
        description: "After publish, trigger ui-release with auto patch-bump"
      cascade-vscode-extension:
        required: false
        type: boolean
        default: false
        description: "Forwarded to ui-release when cascade-ui=true"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 0.3.0)"
        required: true
        type: string
      npm-dist-tag:
        description: "npm distribution tag"
        required: false
        type: string
        default: "latest"
      create-github-release:
        description: "Create GitHub release"
        required: false
        type: boolean
        default: true
      cascade-ui:
        description: "After publish, trigger ui-release with auto patch-bump"
        required: false
        type: boolean
        default: false
      cascade-vscode-extension:
        description: "Forwarded to ui-release when cascade-ui=true"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/_npm-module-release.yaml
    with:
      module: schemas
      version: ${{ inputs.version }}
      npm-dist-tag: ${{ inputs.npm-dist-tag }}
      create-github-release: ${{ inputs.create-github-release }}

  # ---------------------------------------------------------------------------
  # Cascade: compute next ui version (gated on the publish, NOT on the GitHub
  # release, so create-github-release=false doesn't break the chain).
  # ---------------------------------------------------------------------------
  compute-ui-version:
    if: ${{ inputs.cascade-ui && always() && !failure() && !cancelled() }}
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Compute next ui patch version
        id: compute
        run: |
          set -euo pipefail
          version=$(bash scripts/next-cascade-version.sh ui ui/package.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Cascade: release ui (which itself may cascade on to vscode-extension).
  # ---------------------------------------------------------------------------
  cascade-ui:
    needs: compute-ui-version
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/ui-release.yaml
    with:
      version: ${{ needs.compute-ui-version.outputs.version }}
      cascade-vscode-extension: ${{ inputs.cascade-vscode-extension }}
      create-github-release: ${{ inputs.create-github-release }}

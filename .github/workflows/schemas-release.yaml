---

name: Schemas Release

run-name: Schemas Release ${{ inputs.version }}

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: 'Release version (e.g., 0.3.0)'
      maven-release:
        required: false
        type: boolean
        default: true
      npm-publish:
        required: false
        type: boolean
        default: true
      profile:
        type: string
        required: false
        default: 'central'
      npm-dist-tag:
        type: string
        required: false
        default: 'latest'
      create-github-release:
        required: false
        type: boolean
        default: true
      cascade-ui:
        required: false
        type: boolean
        default: false
        description: 'After publish, trigger ui-release with auto patch-bump'
      cascade-vscode-extension:
        required: false
        type: boolean
        default: false
        description: 'Forwarded to ui-release when cascade-ui=true'
    secrets:
      MAVEN_USER:
        required: false
      MAVEN_PASSWORD:
        required: false
      MAVEN_GPG_PRIVATE_KEY:
        required: false
      MAVEN_GPG_PASSPHRASE:
        required: false
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.3.0)'
        required: true
        type: string
      maven-release:
        description: 'Run Maven release (ZIP artifact to Central/GitHub Packages)'
        required: false
        type: boolean
        default: true
      npm-publish:
        description: 'Run npm publish (@netcracker/qip-schemas to GitHub Packages)'
        required: false
        type: boolean
        default: true
      profile:
        description: 'Maven profile to use'
        type: choice
        options:
          - 'central'
          - 'github'
        required: false
        default: 'central'
      npm-dist-tag:
        description: 'npm distribution tag'
        required: false
        type: string
        default: 'latest'
      create-github-release:
        description: 'Create GitHub release'
        required: false
        type: boolean
        default: true
      cascade-ui:
        description: 'After publish, trigger ui-release with auto patch-bump'
        required: false
        type: boolean
        default: false
      cascade-vscode-extension:
        description: 'Forwarded to ui-release when cascade-ui=true'
        required: false
        type: boolean
        default: false

permissions: {}

env:
  RELEASE_VERSION: ${{ inputs.version }}
  RELEASE_TAG: schemas-v${{ inputs.version }}

jobs:
  # ---------------------------------------------------------------------------
  # Maven: set version, verify, deploy ZIP artifact
  # ---------------------------------------------------------------------------
  maven-release:
    if: ${{ inputs.maven-release }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Check tag does not exist
        run: |
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::Tag $RELEASE_TAG already exists"
            exit 1
          fi

      - name: Set up Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: ${{ inputs.profile }}
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
          cache: 'maven'

      - name: Set Maven version
        working-directory: schemas
        run: mvn --batch-mode versions:set -DnewVersion="$RELEASE_VERSION" -DgenerateBackupPoms=false

      - name: Maven deploy
        working-directory: schemas
        env:
          MAVEN_USERNAME: ${{ inputs.profile == 'github' && github.actor || secrets.MAVEN_USER }}
          MAVEN_PASSWORD: ${{ inputs.profile == 'github' && secrets.GITHUB_TOKEN || secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          MVN_PROFILE: ${{ inputs.profile }}
          SKIP_GPG: ${{ inputs.profile == 'github' && '-Dgpg.skip=true' || '' }}
        run: mvn --batch-mode deploy -P"$MVN_PROFILE" $SKIP_GPG

  # ---------------------------------------------------------------------------
  # npm: set version, build, test, publish workspace package
  # ---------------------------------------------------------------------------
  npm-publish:
    if: ${{ inputs.npm-publish }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22.x'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@netcracker'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Set npm version
        working-directory: schemas
        run: npm version "$RELEASE_VERSION" --no-git-tag-version

      - name: Build schemas
        run: npm -w @netcracker/qip-schemas run build

      - name: Test schemas
        run: npm -w @netcracker/qip-schemas test

      - name: Publish
        env:
          NPM_DIST_TAG: ${{ inputs.npm-dist-tag }}
        run: npm -w @netcracker/qip-schemas publish --tag "$NPM_DIST_TAG"

  # ---------------------------------------------------------------------------
  # GitHub Release (after both Maven and npm succeed)
  # ---------------------------------------------------------------------------
  create-release:
    if: ${{ inputs.create-github-release && always() && !failure() && !cancelled() }}
    needs: [maven-release, npm-publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Create tag
        run: |
          git tag "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"

      - name: Run Release Drafter
        uses: netcracker/release-drafter@86f4276a3894b5af70480e826c32fe3648ac6a70 # v1.0.0
        with:
          config-name: "release-drafter-config.yml"
          publish: true
          prerelease: ${{ github.ref_name != 'main' }}
          name: schemas-${{ inputs.version }}
          tag: schemas-v${{ inputs.version }}
          version: schemas-v${{ inputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Cascade: compute next ui version (patch bump from last ui-v* tag)
  # ---------------------------------------------------------------------------
  compute-ui-version:
    if: ${{ inputs.cascade-ui }}
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Compute next ui patch version
        id: compute
        run: |
          set -eu
          LAST=$(git tag --list 'ui-v*' --sort=-version:refname | head -1 | sed 's/^ui-v//')
          if [ -z "$LAST" ]; then
            NEW="0.0.1"
          else
            if ! printf '%s\n' "$LAST" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Last ui tag has unexpected format: $LAST"
              exit 1
            fi
            NEW=$(awk -F. -v OFS=. '{$NF=$NF+1; print}' <<<"$LAST")
          fi
          echo "Computed next ui version: $NEW (from last tag: ${LAST:-<none>})"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Cascade: trigger ui-release with computed version
  # ---------------------------------------------------------------------------
  cascade-ui:
    needs: compute-ui-version
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/ui-release.yaml
    with:
      version: ${{ needs.compute-ui-version.outputs.version }}
      cascade-vscode-extension: ${{ inputs.cascade-vscode-extension }}
      create-github-release: ${{ inputs.create-github-release }}

---
# Release the schemas module as an npm package (@netcracker/qip-schemas) via the
# shared _npm-module-release workflow, then optionally cascade to ui (and on to
# vscode-extension).
#
# This is the COMMON case — schemas ships to npm frequently. The rare Maven
# Central publish (~twice a year, manual) lives in schemas-maven-release.yaml.
#
# No workflow-level concurrency: the reusable serialises per module (group
# includes inputs.module). A wrapper-level group keyed on github.workflow would
# collide with the nested ui/vscode calls and deadlock.

name: Schemas Release

run-name: Schemas Release (${{ inputs.release-type }})

on:
  workflow_call:
    inputs:
      release-type:
        required: false
        type: string
        default: "patch"
        description: "patch | minor | major"
      version:
        required: false
        type: string
        default: ""
        description: "Explicit release version (X.Y.Z) override. Empty = bump current by release-type."
      npm-dist-tag:
        required: false
        type: string
        default: "latest"
      create-github-release:
        required: false
        type: boolean
        default: true
      cascade-ui:
        required: false
        type: boolean
        default: false
        description: "After releasing schemas, also release ui (auto patch-bump)"
      cascade-vscode-extension:
        required: false
        type: boolean
        default: false
        description: "Also release vscode-extension after ui (only when cascade-ui is enabled)"
  workflow_dispatch:
    inputs:
      release-type:
        description: "Release type (ignored if a version override is given)"
        type: choice
        options:
          - "patch"
          - "minor"
          - "major"
        required: false
        default: "patch"
      version:
        required: false
        default: ""
        type: string
        description: "Explicit release version (X.Y.Z) override. Empty = bump current by release-type."
      npm-dist-tag:
        description: "npm distribution tag"
        required: false
        type: string
        default: "latest"
      create-github-release:
        description: "Create GitHub release"
        required: false
        type: boolean
        default: true
      cascade-ui:
        description: "After releasing schemas, also release ui (auto patch-bump)"
        required: false
        type: boolean
        default: false
      cascade-vscode-extension:
        description: "Also release vscode-extension after ui (only when cascade-ui is enabled)"
        required: false
        type: boolean
        default: false

permissions: {}

jobs:
  release:
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/_npm-module-release.yaml
    with:
      module: schemas
      release-type: ${{ inputs.release-type }}
      version: ${{ inputs.version }}
      npm-dist-tag: ${{ inputs.npm-dist-tag }}
      create-github-release: ${{ inputs.create-github-release }}

  # Cascade: release ui (which itself may cascade on to vscode-extension) with an
  # auto patch-bump. Gated on the schemas publish, not on the GitHub release.
  cascade-ui:
    needs: release
    if: ${{ inputs.cascade-ui && always() && !failure() && !cancelled() }}
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/ui-release.yaml
    with:
      release-type: patch
      npm-dist-tag: ${{ inputs.npm-dist-tag }}
      cascade-vscode-extension: ${{ inputs.cascade-vscode-extension }}
      create-github-release: ${{ inputs.create-github-release }}

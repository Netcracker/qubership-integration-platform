---

# On-demand SNAPSHOT publishing to GitHub Packages.
#
# PR builds (see _maven-module-build.yaml) only verify and publish nothing.
# When someone needs a fresh SNAPSHOT of a module in GitHub Packages, they run
# this workflow manually and pick the module. It reuses the same proven
# maven-snapshot-deploy mechanism the PR build used to run on every push — only
# the trigger changed (push → manual).

name: Publish SNAPSHOT (on demand)

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to publish a SNAPSHOT for (X.Y.Z-SNAPSHOT to GitHub Packages)'
        type: choice
        options:
          - all
          - engine
          - micro-engine
          - runtime-catalog
          - sessions-management
        default: all

concurrency:
  group: snapshot-publish-${{ inputs.module }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  publish-snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Publish SNAPSHOT to GitHub Packages
        uses: netcracker/qubership-workflow-hub/actions/maven-snapshot-deploy@ac0b35120b940eaa644cdcfee7d4957038998ec2 # v2.0.9
        with:
          target-store: 'github'
          java-version: '21'
          maven-username: ${{ github.actor }}
          maven-token: ${{ github.token }}
          # No -Drevision override → the version stays X.Y.Z-SNAPSHOT. "all"
          # builds every module; a single module adds -am so qip-monorepo-parent
          # resolves from source (PR builds no longer publish a parent SNAPSHOT).
          maven-command: >
            --batch-mode verify
            -Dgpg.skip=true
            ${{ inputs.module == 'all' && ' ' || format('-pl {0} -am', inputs.module) }}

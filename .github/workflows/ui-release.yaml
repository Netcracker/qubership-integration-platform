---
# Release the ui module as an npm package (@netcracker/qip-ui) via the shared
# _npm-module-release workflow, then optionally cascade to vscode-extension with
# an auto patch-bump. Tag prefix is ui-vX.Y.Z.
#
# No workflow-level concurrency here: the reusable serialises per module
# (group includes inputs.module). A wrapper-level group keyed on github.workflow
# would collide with the nested vscode call and deadlock.

name: Ui Release

on:
  workflow_call:
    inputs:
      release-type:
        required: false
        type: string
        default: "patch"
        description: "patch | minor | major"
      version:
        required: false
        type: string
        default: ""
        description: "Explicit release version (X.Y.Z) override. Empty = bump current by release-type."
      npm-dist-tag:
        required: false
        type: string
        default: "latest"
      cascade-vscode-extension:
        required: false
        type: boolean
        default: false
        description: "After publish, trigger vscode-extension release with an auto patch-bump"
  workflow_dispatch:
    inputs:
      release-type:
        description: "Release type (ignored if a version override is given)"
        type: choice
        options:
          - "patch"
          - "minor"
          - "major"
        required: false
        default: "patch"
      version:
        required: false
        default: ""
        type: string
        description: "Explicit release version (X.Y.Z) override. Empty = bump current by release-type."
      npm-dist-tag:
        description: "NPM distribution tag"
        required: false
        type: string
        default: "latest"
      cascade-vscode-extension:
        description: "After publish, trigger vscode-extension release with an auto patch-bump"
        required: false
        type: boolean
        default: false

permissions: {}

jobs:
  release:
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/_npm-module-release.yaml
    with:
      module: ui
      release-type: ${{ inputs.release-type }}
      version: ${{ inputs.version }}
      npm-dist-tag: ${{ inputs.npm-dist-tag }}
      build-schemas: true

  # Cascade: release vscode-extension with an auto patch-bump (its package.json
  # is the source of truth). Gated on the ui publish job. Calls the reusable
  # directly (not the vscode-extension-release wrapper) to keep the
  # schemas → ui → vscode chain within GitHub's 4-level nesting limit.
  cascade-vscode-extension:
    needs: release
    if: ${{ inputs.cascade-vscode-extension && always() && !failure() && !cancelled() }}
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/_npm-module-release.yaml
    with:
      module: vscode-extension
      release-type: patch
      npm-dist-tag: ${{ inputs.npm-dist-tag }}

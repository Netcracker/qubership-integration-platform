---
# Release the ui module as an npm package (@netcracker/qip-ui) via the shared
# _npm-module-release workflow, then optionally cascade to vscode-extension with
# an auto patch-bump. Tag prefix is ui-vX.Y.Z.

name: Ui Release

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: "Release version (e.g., 1.0.0)"
      npm-dist-tag:
        required: false
        type: string
        default: "latest"
      create-github-release:
        required: false
        default: true
        type: boolean
      cascade-vscode-extension:
        required: false
        type: boolean
        default: false
        description: "After publish, trigger vscode-extension-release with auto patch-bump"
  workflow_dispatch:
    inputs:
      version:
        required: true
        default: "0.0.0"
        type: string
        description: "Release version (e.g., 1.0.0)"
      npm-dist-tag:
        description: "NPM distribution tag"
        required: false
        type: string
        default: "latest"
      create-github-release:
        description: "Create release"
        required: false
        default: true
        type: boolean
      cascade-vscode-extension:
        description: "After publish, trigger vscode-extension-release with auto patch-bump"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/_npm-module-release.yaml
    with:
      module: ui
      version: ${{ inputs.version }}
      npm-dist-tag: ${{ inputs.npm-dist-tag }}
      create-github-release: ${{ inputs.create-github-release }}

  # ---------------------------------------------------------------------------
  # Cascade: compute next vscode-extension version (gated on the publish, NOT on
  # the GitHub release, so create-github-release=false doesn't break the chain).
  # ---------------------------------------------------------------------------
  compute-vscode-version:
    if: ${{ inputs.cascade-vscode-extension && always() && !failure() && !cancelled() }}
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Compute next vscode-extension patch version
        id: compute
        run: |
          set -euo pipefail
          version=$(bash scripts/next-cascade-version.sh vscode-extension vscode-extension/package.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Cascade: release vscode-extension. It is a leaf (no further cascade), so we
  # call the reusable directly rather than the vscode-extension-release wrapper —
  # that keeps the schemas → ui → vscode chain within GitHub's 4-level
  # reusable-workflow nesting limit.
  # ---------------------------------------------------------------------------
  cascade-vscode-extension:
    needs: compute-vscode-version
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/_npm-module-release.yaml
    with:
      module: vscode-extension
      version: ${{ needs.compute-vscode-version.outputs.version }}
      create-github-release: ${{ inputs.create-github-release }}

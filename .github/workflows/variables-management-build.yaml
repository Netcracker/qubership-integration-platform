name: Variables Management Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'variables-management/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build and test
        uses: netcracker/qubership-workflow-hub/actions/maven-snapshot-deploy@ac0b35120b940eaa644cdcfee7d4957038998ec2 # v2.0.9
        with:
          target-store: 'github'
          java-version: '21'
          maven-username: ${{ github.actor }}
          maven-token: ${{ github.token }}
          maven-command: >
            --batch-mode verify
            -Dgpg.skip=true
            -pl variables-management

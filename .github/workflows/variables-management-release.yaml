---
name: Variables Management Release

on:
  workflow_call:
    inputs:
      release-type:
        description: "patch | minor | major"
        required: false
        type: string
        default: "patch"
      version:
        description: "Explicit release version (X.Y.Z) override. Empty = bump current <revision> by release-type."
        required: false
        type: string
        default: ""
      profile:
        description: "Maven profile to use"
        type: string
        required: false
        default: "central"
      build-docker:
        description: "Build Docker image"
        required: false
        default: true
        type: boolean
      create-github-release:
        description: "Create release"
        required: false
        default: true
        type: boolean
      mvn-args:
        description: "Additional maven arguments to pass (e.g. -DskipTests=true -Dmaven.javadoc.skip=true)"
        required: false
        default: ""
        type: string
    secrets:
      MAVEN_USER:
        required: false
      MAVEN_PASSWORD:
        required: false
      MAVEN_GPG_PRIVATE_KEY:
        required: false
      MAVEN_GPG_PASSPHRASE:
        required: false
  workflow_dispatch:
    inputs:
      release-type:
        description: "Release type (ignored if a version override is given)"
        type: choice
        options:
          - "patch"
          - "minor"
          - "major"
        required: false
        default: "patch"
      version:
        description: "Explicit release version (X.Y.Z) override. Empty = bump current <revision> by release-type."
        required: false
        default: ""
        type: string
      profile:
        description: "Maven profile to use"
        type: choice
        options:
          - "github"
          - "central"
        required: false
        default: "central"
      build-docker:
        description: "Build Docker image"
        required: false
        default: true
        type: boolean
      create-github-release:
        description: "Create release"
        required: false
        default: true
        type: boolean
      mvn-args:
        description: "Additional maven arguments to pass (e.g. -DskipTests=true -Dmaven.javadoc.skip=true)"
        required: false
        default: ""
        type: string

permissions: {}

jobs:
  release:
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/_maven-module-release.yaml
    with:
      module: variables-management
      release-type: ${{ inputs.release-type }}
      version: ${{ inputs.version }}
      profile: ${{ inputs.profile }}
      build-docker: ${{ inputs.build-docker }}
      create-github-release: ${{ inputs.create-github-release }}
      mvn-args: ${{ inputs.mvn-args }}
    secrets:
      MAVEN_USER: ${{ secrets.MAVEN_USER }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

---

# Triggers on changes in vscode-extension/, ui/, or schemas/ since the
# extension embeds @netcracker/qip-ui and consumes @netcracker/qip-schemas.

name: Vscode Extension Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'vscode-extension/**'
      - 'ui/**'
      - 'schemas/**'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@netcracker'
          cache: 'npm'

      - name: Install dependencies (root workspaces)
        run: npm ci --legacy-peer-deps

      - name: Build workspace dependencies
        working-directory: vscode-extension
        run: npm run prepare-deps

      - name: ESLint
        working-directory: vscode-extension
        run: npx --no-install eslint src

      - name: TypeScript type check
        working-directory: vscode-extension
        run: npm run check-types

  npm-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@netcracker'
          cache: 'npm'

      - name: Install dependencies (root workspaces)
        run: npm ci --legacy-peer-deps

      - name: Build workspace dependencies
        working-directory: vscode-extension
        run: npm run prepare-deps

      - name: Test with coverage
        working-directory: vscode-extension
        run: npm run test:unit:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: vscode-extension-coverage
          path: vscode-extension/coverage/lcov.info
          if-no-files-found: warn
          retention-days: 1

  sonar:
    needs: npm-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Download coverage report
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: vscode-extension-coverage
          path: vscode-extension/coverage

      - name: Sonar scan (SonarQube Cloud)
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectBaseDir: vscode-extension
          args: >
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_VSCODE_EXTENSION_PROJECT_KEY }}
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/*.test.tsx,**/*.spec.tsx
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true

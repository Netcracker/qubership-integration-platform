---
# Release the vscode-extension module as an npm package
# (@netcracker/qip-vscode-extension). Thin wrapper over the shared
# _npm-module-release workflow; tag prefix is vscode-extension-vX.Y.Z.

name: Vscode Extension Release

on:
  workflow_call:
    inputs:
      release-type:
        required: false
        type: string
        default: "patch"
        description: "patch | minor | major"
      version:
        required: false
        type: string
        default: ""
        description: "Explicit release version (X.Y.Z) override. Empty = bump current by release-type."
      npm-dist-tag:
        required: false
        type: string
        default: "latest"
  workflow_dispatch:
    inputs:
      release-type:
        description: "Release type (ignored if a version override is given)"
        type: choice
        options:
          - "patch"
          - "minor"
          - "major"
        required: false
        default: "patch"
      version:
        required: false
        default: ""
        type: string
        description: "Explicit release version (X.Y.Z) override. Empty = bump current by release-type."
      npm-dist-tag:
        description: "NPM distribution tag"
        required: false
        type: string
        default: "latest"

permissions: {}

jobs:
  release:
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/_npm-module-release.yaml
    with:
      module: vscode-extension
      release-type: ${{ inputs.release-type }}
      version: ${{ inputs.version }}
      npm-dist-tag: ${{ inputs.npm-dist-tag }}

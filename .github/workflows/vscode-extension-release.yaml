---

# Release the vscode-extension module as an npm package
# (@netcracker/qip-vscode-extension). Thin wrapper over the shared
# _npm-module-release workflow; tag prefix is vscode-extension-vX.Y.Z.

name: Vscode Extension Release

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: 'Release version (e.g., 1.0.0)'
      npm-dist-tag:
        required: false
        type: string
        default: 'latest'
      create-github-release:
        required: false
        default: true
        type: boolean
  workflow_dispatch:
    inputs:
      version:
        required: true
        default: '0.0.0'
        type: string
        description: 'Release version (e.g., 1.0.0)'
      npm-dist-tag:
        description: 'NPM distribution tag'
        required: false
        type: string
        default: 'latest'
      create-github-release:
        description: 'Create release'
        required: false
        default: true
        type: boolean

permissions: {}

jobs:
  release:
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/_npm-module-release.yaml
    with:
      module: vscode-extension
      version: ${{ inputs.version }}
      npm-dist-tag: ${{ inputs.npm-dist-tag }}
      create-github-release: ${{ inputs.create-github-release }}

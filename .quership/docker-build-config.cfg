{
  "registry": "ghcr.io",
  "security": {
    "scan": true,
    "only_high_critical": true,
    "trivy_scan": true,
    "grype_scan": true,
    "only_fixed": true,
    "continue_on_error": true,
    "tag": "latest"
  },
  "defaults": {
    "dockerfile": "Dockerfile",
    "context": ".",
    "tags": "latest",
    "platforms": "linux/amd64, linux/arm64"
  },
  "components": [
    {
      "name": "qubership-integration-engine",
      "dockerfile": "engine/Dockerfile",
      "context": "engine",
      "changeset": ["engine"]
    },
    {
      "name": "qubership-integration-micro-engine",
      "dockerfile": "micro-engine/Dockerfile",
      "context": "micro-engine",
      "changeset": ["micro-engine"]
    },
    {
      "name": "qubership-integration-runtime-catalog",
      "dockerfile": "runtime-catalog/Dockerfile",
      "context": "runtime-catalog",
      "changeset": ["runtime-catalog"]
    },
    {
      "name": "qubership-integration-sessions-management",
      "dockerfile": "sessions-management/Dockerfile",
      "context": "sessions-management",
      "changeset": ["sessions-management"]
    }
  ]
}

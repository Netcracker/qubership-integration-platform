# =============================================================================
# QIP AI Service Application Properties
# Sensitive values MUST be provided via environment variables in production.
# =============================================================================

# --- Application ---
quarkus.application.name=qip-ai-service
quarkus.http.port=3000

# --- CORS ---
# quarkus.http.cors=true
# quarkus.http.cors.origins=*
# quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
# quarkus.http.cors.headers=Content-Type,Authorization,Accept,Cache-Control,X-Requested-With
# quarkus.http.cors.exposed-headers=Content-Type
# quarkus.http.cors.access-control-max-age=24H
# Production: set env var to restrict origins, e.g. CORS_ORIGINS=https://your-app.example.com
# %prod.quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:8080}


# Enable the CORS filter
quarkus.http.cors.enabled=true

# Allow all origins (regex). Browsers preflight with Authorization/Content-Type — methods and headers must be allowed.
# Without explicit headers, cross-origin fetch from the UI (e.g. :4300 -> :3000) can fail with "Failed to fetch".
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS,HEAD
quarkus.http.cors.headers=accept,accept-language,authorization,content-type,origin,access-control-request-method,access-control-request-headers
quarkus.http.cors.exposed-headers=content-type,location,content-disposition
quarkus.http.cors.access-control-max-age=24H


# --- LLM: Chat Model ---
quarkus.langchain4j.openai.api-key=${LLM_API_KEY}
quarkus.langchain4j.openai.base-url=${LLM_BASE_URL}
quarkus.langchain4j.openai.chat-model.model-name=${LLM_CHAT_MODEL}
quarkus.langchain4j.openai.chat-model.temperature=${LLM_TEMPERATURE}
quarkus.langchain4j.openai.chat-model.max-completion-tokens=${LLM_MAX_TOKENS}
quarkus.langchain4j.timeout=${LLM_TIMEOUT}

# Chat memory: token window for agents (local Jtokkit estimator; avoids HTTP token count during streaming).
# Default 24k: IDS attachments (~9k) + catalog tool results need headroom before eviction.
quarkus.langchain4j.chat-memory.type=TOKEN_WINDOW
quarkus.langchain4j.chat-memory.token-window.max-tokens=${CHAT_MEMORY_MAX_TOKENS:24000}

# --- LLM: Embedding Model ---
quarkus.langchain4j.openai.embedding-model.model-name=${LLM_EMBEDDING_MODEL:qwen3-vl-embedding-8b}
qip.ai.rag.embedding-encoding-format=${LLM_EMBEDDING_ENCODING_FORMAT:float}

# RAG embeddings: in-memory store (see InMemoryEmbeddingStoreProducer)

# --- APIHUB MCP ---
# DevOps env (MCP is not the same root as generic catalog REST):
# | Variable            | Role |
# | APIHUB_MCP_URL      | Preferred MCP HTTP base (POST JSON-RPC here), e.g. https://apihub.example.com/api/v1/mcp/ — trailing slash matters. |
# | APIHUB_BASE_URL     | Fallback when APIHUB_MCP_URL is unset (legacy / compose). |
# | APIHUB_MCP_API_KEY  | Sent as HTTP header "api-key" (Netcracker MCP). |
# | APIHUB_MCP_BEARER   | Optional alias: same value as api-key for older .env files (not Authorization Bearer for this client). |
# Catalog URL (CATALOG_URL) is separate — do not point the MCP client at the catalog API root.
# Base URL for the MCP HTTP entrypoint: POST JSON-RPC to this URL.
qip.ai.apihub.base-url=${APIHUB_MCP_URL:${APIHUB_BASE_URL:}}
# At startup: call MCP initialize + tools/list and log status / remote tool names (INFO). Env overrides profile.
qip.ai.apihub.probe-on-startup=${APIHUB_MCP_PROBE_ON_STARTUP:false}
%dev.qip.ai.apihub.probe-on-startup=${APIHUB_MCP_PROBE_ON_STARTUP:true}
%test.qip.ai.apihub.probe-on-startup=false

# --- Catalog REST API ---
# Quarkus Cache (Caffeine): shared catalog HTTP read caches
quarkus.cache.caffeine."catalog-operations-by-model".expire-after-write=10M
quarkus.cache.caffeine."catalog-operations-by-model".maximum-size=200
quarkus.cache.caffeine."catalog-element".expire-after-write=60S
quarkus.cache.caffeine."catalog-element".maximum-size=500
quarkus.cache.caffeine."element-patch-json-schema-envelope".expire-after-write=1H
quarkus.cache.caffeine."element-patch-json-schema-envelope".maximum-size=100
quarkus.cache.caffeine."element-patch-properties-schema".expire-after-write=1H
quarkus.cache.caffeine."element-patch-properties-schema".maximum-size=100

# Element PATCH JSON Schema validation: legacy (custom) or networknt (draft-07 pilot types)
qip.ai.schema.validation.engine=${SCHEMA_VALIDATION_ENGINE:legacy}
qip.ai.schema.validation.networknt.element-types=${SCHEMA_VALIDATION_NETWORKNT_TYPES:service-call,http-trigger}

%test.quarkus.cache.enabled=false

qip.ai.catalog.base-url=${CATALOG_URL:http://localhost:8091}
qip.ai.catalog.token=${CATALOG_TOKEN:}
# Log truncated catalog REST request/response bodies at INFO (one line). Default true; set CATALOG_LOG_RESPONSE_BODY=false to reduce noise.
qip.ai.catalog.log-response-body=${CATALOG_LOG_RESPONSE_BODY:true}

# --- REST Clients ---
# Catalog: CatalogOutboundLoggingFilter logs each outbound call (method, URL, status, request/response body preview at INFO when enabled).
quarkus.rest-client.apihub-mcp.url=${APIHUB_MCP_URL:${APIHUB_BASE_URL:}}
quarkus.rest-client.apihub-mcp.scope=jakarta.inject.Singleton
# Netcracker API Hub MCP validates "api-key". APIHUB_MCP_BEARER kept as alias for local .env compatibility.
# Default "test" satisfies SmallRye non-empty header binding when unset; override in all real environments.
quarkus.rest-client.apihub-mcp.headers.api-key=${APIHUB_MCP_API_KEY:${APIHUB_MCP_BEARER:test}}
quarkus.rest-client.catalog-api.url=${CATALOG_URL:http://localhost:8091}
quarkus.rest-client.catalog-api.scope=jakarta.inject.Singleton
quarkus.rest-client.catalog-api.headers.Authorization=Bearer ${CATALOG_TOKEN:}

# --- HITL ---
qip.ai.hitl.timeout-seconds=${HITL_TIMEOUT_SECONDS:300}

# --- RAG Ingestion ---
qip.ai.rag.chunk-size=${RAG_CHUNK_SIZE:800}
qip.ai.rag.chunk-overlap=${RAG_CHUNK_OVERLAP:100}

# --- Conversation ---
qip.ai.conversation.max-messages=${CONVERSATION_MAX_MESSAGES:100}

# --- Object storage (bucket name; MinIO/S3 connection is profile-specific below) ---
qip.ai.storage.bucket-name=${STORAGE_BUCKET_NAME:qip-ai-storage}
# When true, head/create bucket at startup (requires MinIO/S3 reachable). Default false so prod/containers start without MinIO.
qip.ai.storage.initialize-bucket-on-startup=${STORAGE_INIT_BUCKET_ON_STARTUP:false}
quarkus.http.limits.max-body-size=50M
quarkus.http.limits.max-form-attribute-size=50M

# Active ChainImplementationPlan injected into guardrail/router/implement prompts
qip.ai.chain-plan.prompt-max-chars=${CHAIN_PLAN_PROMPT_MAX_CHARS:6000}
qip.ai.chain-plan.archive-max=${CHAIN_PLAN_ARCHIVE_MAX:5}

# Router: embedding similarity over routing/route-examples.yaml (separate store from RAG; see EmbeddingScenarioRouter)
qip.ai.router.embedding.enabled=${ROUTER_EMBEDDING_ENABLED:true}
qip.ai.router.embedding.min-score=${ROUTER_EMBEDDING_MIN_SCORE:0.72}
qip.ai.router.embedding.min-margin=${ROUTER_EMBEDDING_MIN_MARGIN:0.04}
qip.ai.router.embedding.max-results=${ROUTER_EMBEDDING_MAX_RESULTS:5}

# One INFO line with aggregated assistant text after streaming completes (readable alternative to per-chunk responses).
qip.ai.trace.log-assistant-result=${AI_TRACE_LOG_ASSISTANT_RESULT:false}
qip.ai.trace.assistant-result-max-chars=${AI_TRACE_ASSISTANT_RESULT_MAX_CHARS:8000}

# --- AI assistant observability ---
# LangChain4j: logs each outbound LLM HTTP request/response (prompt/completion bodies). Disabled in %prod and %test.
# Streaming repeats response fragments — in dev, response logging is off; use qip.ai.trace.log-assistant-result
# and tool INFO lines. Set %dev.quarkus.langchain4j.log-responses=true to debug raw stream chunks.
# LangChain4j: logs each outbound LLM HTTP request/response (prompt/completion bodies). Default off — opt in per profile when debugging raw payloads.
quarkus.langchain4j.log-requests=false
quarkus.langchain4j.log-responses=false
quarkus.log.category."io.quarkiverse.langchain4j".level=INFO
quarkus.log.category."dev.langchain4j".level=INFO
# Optional: show conversationId from MDC (set in ScenarioRouter during chat streams):
# %dev.quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%X{conversationId}] [%c{2.}] (%t) %s%e%n
# Optional: catalog request bodies at DEBUG (when qip.ai.catalog.log-response-body is false, response body uses DEBUG here).
# %dev.quarkus.log.category."org.qubership.integration.platform.ai.integration.catalog.CatalogOutboundLoggingFilter".level=DEBUG

# =============================================================================
# Dev profile overrides
# =============================================================================
%dev.quarkus.langchain4j.log-requests=false
%dev.quarkus.langchain4j.log-responses=false
%dev.qip.ai.trace.log-assistant-result=true
%dev.quarkus.tls.trust-all=true
%dev.quarkus.langchain4j.openai.tls.trust-all=true
%dev.qip.ai.storage.initialize-bucket-on-startup=${STORAGE_INIT_BUCKET_ON_STARTUP:true}

# =============================================================================
# Prod profile overrides
# =============================================================================
%prod.quarkus.langchain4j.log-requests=false
%prod.quarkus.langchain4j.log-responses=false
%prod.quarkus.tls.trust-all=false
%prod.quarkus.langchain4j.openai.tls.trust-all=false
# Opt in via CATALOG_LOG_RESPONSE_BODY=true when you need catalog JSON in prod logs.
%prod.qip.ai.catalog.log-response-body=false
# In prod, CORS_ORIGINS env var must be set to the actual frontend origin.
# Example: CORS_ORIGINS=https://your-app.example.com
# Using regex syntax: /https:\/\/your-app\.example\.com/
# %prod.quarkus.http.cors.origins=${CORS_ORIGINS:https://localhost}

# =============================================================================
# Test profile overrides
# =============================================================================
%test.quarkus.langchain4j.openai.api-key=test-key
%test.quarkus.langchain4j.openai.base-url=http://localhost:0/v1/
%test.quarkus.langchain4j.openai.chat-model.model-name=test-chat-model
%test.quarkus.langchain4j.openai.chat-model.temperature=0.0
%test.quarkus.langchain4j.openai.chat-model.max-completion-tokens=16
%test.quarkus.langchain4j.timeout=5s
%test.quarkus.langchain4j.openai.embedding-model.model-name=test-embedding-model
%test.quarkus.rest-client.apihub-mcp.url=http://localhost:0/
%test.quarkus.rest-client.catalog-api.url=http://localhost:0/
%test.qip.ai.apihub.base-url=http://localhost:0/
%test.qip.ai.catalog.log-response-body=false
%test.qip.ai.router.embedding.enabled=false
%test.quarkus.langchain4j.log-requests=false
%test.quarkus.langchain4j.log-responses=false
%test.quarkus.arc.selected-alternatives=org.qubership.integration.platform.ai.chat.chainplan.TestPlanApprovalGate

# =============================================================================
# MinIO / S3 (quarkus-amazon-s3)
# =============================================================================
%dev.quarkus.s3.devservices.enabled=false
%dev.quarkus.s3.endpoint-override=${MINIO_ENDPOINT:http://localhost:9000}
%dev.quarkus.s3.path-style-access=true
%dev.quarkus.s3.aws.region=${MINIO_REGION:us-east-1}
%dev.quarkus.s3.aws.credentials.type=static
%dev.quarkus.s3.aws.credentials.static-provider.access-key-id=${MINIO_ACCESS_KEY:minioadmin}
%dev.quarkus.s3.aws.credentials.static-provider.secret-access-key=${MINIO_SECRET_KEY:minioadmin}
%dev.quarkus.s3.sync-client.tls-trust-managers-provider.type=trust-all

%prod.quarkus.s3.devservices.enabled=false
%prod.quarkus.s3.endpoint-override=${MINIO_ENDPOINT}
%prod.quarkus.s3.path-style-access=true
%prod.quarkus.s3.aws.region=${MINIO_REGION:us-east-1}
%prod.quarkus.s3.aws.credentials.type=static
%prod.quarkus.s3.aws.credentials.static-provider.access-key-id=${MINIO_ACCESS_KEY}
%prod.quarkus.s3.aws.credentials.static-provider.secret-access-key=${MINIO_SECRET_KEY}

%test.quarkus.s3.devservices.enabled=false
%test.quarkus.s3.endpoint-override=http://127.0.0.1:1
%test.quarkus.s3.path-style-access=true
%test.quarkus.s3.aws.region=us-east-1
%test.quarkus.s3.aws.credentials.type=static
%test.quarkus.s3.aws.credentials.static-provider.access-key-id=test
%test.quarkus.s3.aws.credentials.static-provider.secret-access-key=test

services:
  ###### QIP
  qip-runtime-catalog:
    build:
      context: ../runtime-catalog
      dockerfile: Dockerfile
    container_name: qip-runtime-catalog
    read_only: true
    ports:
      - "8091:8080"
      - "5006:5005"
    env_file: "qip-dev.env"
    command:
      [
        "/opt/java/openjdk/bin/java",
        "-Xmx642m",
        "-XX:MetaspaceSize=192m",
        "-XX:MaxMetaspaceSize=192m",
        "-XX:MaxDirectMemorySize=64m",
        "-XX:+ExitOnOutOfMemoryError",
        "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005",
        "-Djava.security.egd=file:/dev/./urandom",
        "-Dfile.encoding=UTF-8",
        "-Dspring.profiles.active=development",
        "-jar",
        "/app/qip-runtime-catalog.jar",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --silent --fail localhost:8080/actuator/health || exit 1",
        ]
      interval: 10s
      timeout: 15s
      retries: 15
      start_period: 30s
    networks:
      default:
        aliases:
          - runtime-catalog
    depends_on:
      postgres:
        condition: service_healthy

  qip-engine:
    build:
      context: ../engine
      dockerfile: Dockerfile
    container_name: qip-engine
    read_only: true
    ports:
      - "8092:8080"
      - "5007:5005"
    env_file:
      - "qip-dev.env"
      - "engine-dev.env"
    command:
      [
        "/opt/java/openjdk/bin/java",
        "-Xmx832m",
        "-XX:MetaspaceSize=512m",
        "-XX:MaxMetaspaceSize=224m",
        "-XX:MaxDirectMemorySize=224m",
        "-XX:+ExitOnOutOfMemoryError",
        "-XX:+HeapDumpOnOutOfMemoryError",
        "-XX:HeapDumpPath=/tmp/leak.hprof",
        "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005",
        "-Djava.security.egd=file:/dev/./urandom",
        "--add-opens=java.base/java.lang=ALL-UNNAMED",
        "--add-opens=java.base/java.lang.reflect=ALL-UNNAMED",
        "--add-opens=java.base/java.util=ALL-UNNAMED",
        "--add-opens=java.base/java.io=ALL-UNNAMED",
        "-Dfile.encoding=UTF-8",
        "-Dspring.profiles.active=development",
        "-jar",
        "/app/qip-engine.jar",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --silent --fail localhost:8080/actuator/health || exit 1",
        ]
      interval: 10s
      timeout: 15s
      retries: 15
      start_period: 30s
    volumes:
      - ./kafka-ssl/client:/app/cert/defaultsslcertificate
    networks:
      default:
        aliases:
          - engine
    depends_on:
      opensearch:
        condition: service_healthy
      postgres:
        condition: service_healthy

  qip-sessions-management:
    build:
      context: ../sessions-management
      dockerfile: Dockerfile
    container_name: qip-sessions-management
    read_only: true
    ports:
      - "8093:8080"
      - "5008:5005"
    env_file: "qip-dev.env"
    command:
      [
        "/opt/java/openjdk/bin/java",
        "-Xmx416m",
        "-XX:MetaspaceSize=192m",
        "-XX:MaxMetaspaceSize=192m",
        "-XX:MaxDirectMemorySize=64m",
        "-XX:+ExitOnOutOfMemoryError",
        "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005",
        "-Djava.security.egd=file:/dev/./urandom",
        "--add-opens=java.base/java.lang=ALL-UNNAMED",
        "--add-opens=java.base/java.util=ALL-UNNAMED",
        "-Dfile.encoding=UTF-8",
        "-Dspring.profiles.active=development",
        "-jar",
        "/app/qip-sessions-management.jar",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --silent --fail localhost:8080/actuator/health || exit 1",
        ]
      interval: 10s
      timeout: 15s
      retries: 15
      start_period: 30s
    networks:
      default:
        aliases:
          - sessions-management
    depends_on:
      opensearch:
        condition: service_healthy

  ui-proxy:
    image: nginx:latest
    container_name: ui-proxy
    ports:
      - 8080:8080
    volumes:
      - ./nginx:/etc/nginx/
    depends_on:
      qip-runtime-catalog:
        condition: service_started
      qip-sessions-management:
        condition: service_started
      qip-engine:
        condition: service_started


apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ui
spec:
  type: NodePort
  selector:
    app: {{ .Release.Name }}-ui
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
{{- if .Values.global.qip.ui.port }}
      nodePort: {{ .Values.global.qip.ui.port }}
{{- end }}

---
$id: http://qubership.org/schemas/product/qip/element/context-storage.schema.yaml
$schema: http://json-schema.org/draft-07/schema
type: object
allOf:
  - $ref: "http://qubership.org/schemas/product/qip/element/properties/common-element-properties.schema.yaml"
title: Context Storage
metaInfo:
  application: Qubership Integration Platform
  labels:
    - QIP
properties:
  type:
    type: string
    const: context-storage
  properties:
    type: object
    properties:
      contextServiceId:
        type: string
        title: Context Service
      useCorrelationId:
        type: boolean
        title: Use correlation ID as context ID
      operation:
        type: string
        oneOf:
          - const: SET
            title: Create context
          - const: GET
            title: Get context
          - const: DELETE
            title: Delete context
        title: Operation
        default: SET
    allOf:
      - if:
          properties:
            useCorrelationId:
              const: false
        then:
          properties:
            contextId:
              type: string
              title: Context ID
          required:
            - contextId
      - if:
          properties:
            operation:
              const: SET
        then:
          properties:
            key:
              type: string
              title: Key
            value:
              type: string
              title: Value
            ttl:
              type: integer
              title: Time to live
              description: Context life time (in seconds).
              default: 21600
          required:
            - key
            - ttl
      - if:
          properties:
            operation:
              const: GET
        then:
          properties:
            keys:
              type: string
              title: Keys
            target:
              type: string
              oneOf:
                - const: BODY
                  title: Body
                - const: HEADER
                  title: Header
                - const: PROPERTY
                  title: Property
              title: Target
              default: BODY
            unwrap:
              type: boolean
              title: Unwrap
              description: Unwrap value
              default: false
          if:
            properties:
              target:
                enum:
                  - HEADER
                  - PROPERTY
          then:
            properties:
              targetName:
                type: string
                title: Target field name
            required:
              - targetName
          required:
            - target
    required:
      - contextServiceId
      - useCorrelationId
      - operation
required:
  - type

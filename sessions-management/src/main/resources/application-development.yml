server:
  port: 8080

logging:
  level:
    root: ${ROOT_LOG_LEVEL:WARN}
    org.qubership.integration.platform: DEBUG
  format: ${LOG_FORMAT:text}

spring:
  config:
    import: optional:consul:${CONSUL_URL:http://consul:8500}
  cloud:
    consul:
      config:
        m2m:
          enabled: false
        acl-token: ${CONSUL_ADMIN_TOKEN}

qip:
  standalone: true
  internal-services:
    runtime-catalog: qip-runtime-catalog
